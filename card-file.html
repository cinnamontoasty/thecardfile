function renderDayView(body,d){
  const ds=dateStr(d);
  const isToday=ds===todayStr();
  const isPast=ds<todayStr();
  const label=isToday?'Today — '+d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}):d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const{nav,prev,next}=navBar(label);
  prev.onclick=()=>{S.scheduleDate=addDays(d,-1);render();};
  next.onclick=()=>{S.scheduleDate=addDays(d,1);render();};
  body.appendChild(nav);

  const tasks=tasksDueOn(ds);
  if(!tasks.length){
    const emp=el('div','empty');const tx=el('div','empty-text');
    tx.textContent=isPast?'No tasks were scheduled for this day.':'No tasks scheduled for this day.';
    emp.appendChild(tx);body.appendChild(emp);return;
  }

  // Past day label
  if(isPast){
    const pastNote=el('div');
    pastNote.style.cssText='font-size:11px;color:var(--brown-light);font-style:italic;margin-bottom:10px;text-align:center;';
    pastNote.textContent='Showing tasks that were scheduled for this day';
    body.appendChild(pastNote);
  }

  // Group by area/room only — no time of day grouping in day view
  const areas=[...new Set(tasks.map(t=>t.area||'General'))].sort();
  areas.forEach(area=>{
    const areaTasks=sortByFreq(tasks.filter(t=>(t.area||'General')===area));
    if(!areaTasks.length)return;
    const aHead=el('div','area-heading');aHead.textContent=area;body.appendChild(aHead);
    const grid=el('div','cards-grid');
    areaTasks.forEach(task=>{
      grid.appendChild(renderCard(task,false,{dateContext:ds}));
    });
    body.appendChild(grid);
  });
}

function renderWeekView(body,d){
  const dow=d.getDay();
  const sunday=addDays(d,-dow);
  const days=Array.from({length:7},(_,i)=>addDays(sunday,i));
  const label=days[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+days[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const{nav,prev,next}=navBar(label);
  prev.onclick=()=>{S.scheduleDate=addDays(sunday,-7);render();};
  next.onclick=()=>{S.scheduleDate=addDays(sunday,7);render();};
  body.appendChild(nav);

  // Single unified grid — headers on row 1, tasks below
  const grid=el('div');
  grid.style.cssText='display:grid;grid-template-columns:repeat(7,1fr);gap:4px;width:100%;';

  // Row 1: day headers
  days.forEach((day,i)=>{
    const ds=dateStr(day);
    const isToday=ds===todayStr();
    const hdr=el('div','week-col-header'+(isToday?' today':''));
    hdr.style.cssText+='min-width:0;';
    hdr.innerHTML=`<div style="font-size:9px;">${DAY_NAMES[i]}</div><div style="font-size:11px;font-weight:700;">${day.getDate()}</div>`;
    grid.appendChild(hdr);
  });

  // Row 2+: task columns — one cell per day
  days.forEach(day=>{
    const ds=dateStr(day);
    const col=el('div','week-col');
    col.style.cssText='min-width:0;display:flex;flex-direction:column;gap:3px;';

    // Sort tasks by timeOfDay order
    const todOrder=['dawn','morning','afternoon','evening',''];
    const tasks=tasksDueOn(ds).sort((a,b)=>{
      return todOrder.indexOf(a.timeOfDay||'')- todOrder.indexOf(b.timeOfDay||'');
    });

    tasks.forEach(task=>{
      const bg=cardBg(task);
      const doneOnDs=isDoneForDay(task,ds);
      const skippedOnDs=(task.skips||[]).includes(ds);
      const mc=el('div','week-mini-card');

      if(doneOnDs){
        mc.style.cssText=`background:${bg};border-radius:3px;padding:4px 5px;font-size:9px;font-weight:700;line-height:1.3;cursor:pointer;min-width:0;overflow:hidden;opacity:0.45;text-decoration:line-through;`;
        mc.style.color='rgba(0,0,0,0.5)';
        if(S.darkMode) mc.style.color='rgba(255,240,220,0.5)';
        mc.textContent='✓ '+task.name;
        mc.title=task.name+' — completed';
      }else if(skippedOnDs){
        mc.style.cssText=`background:${bg};border-radius:3px;padding:4px 5px;font-size:9px;font-weight:700;line-height:1.3;cursor:pointer;min-width:0;overflow:hidden;opacity:0.55;font-style:italic;position:relative;`;
        mc.style.color='rgba(0,0,0,0.45)';
        if(S.darkMode) mc.style.color='rgba(255,240,220,0.45)';
        // Cross-hatch overlay via inline pseudo-element workaround using a child div
        const hatch=el('div');
        hatch.style.cssText='position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(150,150,150,0.15) 0px,rgba(150,150,150,0.15) 2px,transparent 2px,transparent 8px);pointer-events:none;border-radius:3px;';
        mc.style.position='relative';
        mc.textContent='→ '+task.name;
        mc.title=task.name+' — skipped';
        mc.appendChild(hatch);
      }else{
        mc.style.cssText=`background:${bg};border-radius:3px;padding:4px 5px;font-size:9px;font-weight:700;line-height:1.3;cursor:pointer;min-width:0;overflow:hidden;`;
        // Dark text check
        const hexC=cardColor(task);
        const rr=parseInt(hexC.slice(1,3),16),gg=parseInt(hexC.slice(3,5),16),bb=parseInt(hexC.slice(5,7),16);
        const lum=(rr*0.299+gg*0.587+bb*0.114)/255;
        const needsDark=lum>0.62||task.freq==='d';
        mc.style.color=needsDark?'rgba(0,0,0,0.78)':'rgba(255,255,255,0.92)';
        if(S.darkMode&&!needsDark) mc.style.color='rgba(255,240,220,0.88)';
        const tod=TIME_OF_DAY.find(t=>t.id===(task.timeOfDay||''));
        const todEmoji=tod&&tod.id?tod.label.split(' ')[0]:'';
        mc.textContent=(todEmoji?todEmoji+' ':'')+task.name;
        mc.title=task.name+' ('+fById(task.freq).label+(task.timeOfDay?' · '+tod?.label:'')+')';
      }
      mc.onclick=()=>{S.scheduleDate=day;S.scheduleView='day';render();};
      col.appendChild(mc);
    });

    if(!tasks.length){
      const empty=el('div');
      empty.style.cssText='font-size:10px;color:var(--border);text-align:center;padding:6px 0;';
      empty.textContent='·';
      col.appendChild(empty);
    }
    grid.appendChild(col);
  });

  body.appendChild(grid);
}

function renderMonthView(body,d){
  const year=d.getFullYear(),month=d.getMonth();
  const label=MONTH_NAMES[month]+' '+year;
  const{nav,prev,next}=navBar(label);
  prev.onclick=()=>{S.scheduleDate=new Date(year,month-1,1);render();};
  next.onclick=()=>{S.scheduleDate=new Date(year,month+1,1);render();};
  body.appendChild(nav);

  const grid=el('div','month-grid');
  DAY_NAMES.forEach(n=>{const h=el('div','month-day-header');h.textContent=n[0];grid.appendChild(h);});

  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const daysInPrev=new Date(year,month,0).getDate();

  // Prev month padding
  for(let i=firstDay-1;i>=0;i--){
    const cell=el('div','month-cell other-month');
    const dn=el('div','month-cell-date');dn.textContent=daysInPrev-i;
    cell.appendChild(dn);grid.appendChild(cell);
  }

  for(let day=1;day<=daysInMonth;day++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday=ds===todayStr();
    const cell=el('div','month-cell'+(isToday?' today':''));
    const dn=el('div','month-cell-date');dn.textContent=day;cell.appendChild(dn);
    const todOrder=['dawn','morning','afternoon','evening',''];
    const tasks=tasksDueOn(ds).sort((a,b)=>todOrder.indexOf(a.timeOfDay||'')-todOrder.indexOf(b.timeOfDay||''));
    if(tasks.length){
      const dotRow=el('div','month-dot-row');
      tasks.forEach(t=>{
        const dot=el('span','month-dot');
        dot.style.background=cardColor(t);
        dot.title=t.name;
        dotRow.appendChild(dot);
      });
      cell.appendChild(dotRow);
    }
    cell.onclick=()=>{S.scheduleDate=parseDate(ds);S.scheduleView='day';render();};
    grid.appendChild(cell);
  }

  // Next month padding
  const totalCells=firstDay+daysInMonth;
  const remainder=totalCells%7===0?0:7-(totalCells%7);
  for(let i=1;i<=remainder;i++){
    const cell=el('div','month-cell other-month');
    const dn=el('div','month-cell-date');dn.textContent=i;cell.appendChild(dn);grid.appendChild(cell);
  }
  body.appendChild(grid);
}

function renderYearView(body,d){
  const year=d.getFullYear();
  const{nav,prev,next}=navBar(String(year));
  prev.onclick=()=>{S.scheduleDate=new Date(year-1,0,1);render();};
  next.onclick=()=>{S.scheduleDate=new Date(year+1,0,1);render();};
  body.appendChild(nav);

  const grid=el('div','year-grid');
  for(let m=0;m<12;m++){
    const mCard=el('div','year-month');
    const mt=el('div','year-month-title');mt.textContent=MONTH_NAMES[m].slice(0,3);mCard.appendChild(mt);
    const daysInMonth=new Date(year,m+1,0).getDate();
    const firstDow=new Date(year,m,1).getDay();
    const miniGrid=el('div','year-mini-grid');
    // Padding
    for(let p=0;p<firstDow;p++){
      const c=el('div');c.style.cssText='min-height:18px;';miniGrid.appendChild(c);
    }
    for(let day=1;day<=daysInMonth;day++){
      const ds=`${year}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const tasks=tasksDueOn(ds);
      const isToday=ds===todayStr();
      const cell=el('div','year-cell'+(isToday?' is-today':''));
      if(isToday) cell.style.outline='1.5px solid var(--gold)';
      if(tasks.length){
        tasks.slice(0,15).forEach(t=>{
          const dot=el('div');
          dot.style.cssText=`width:4px;height:4px;border-radius:50%;background:${cardColor(t)};flex-shrink:0;`;
          cell.appendChild(dot);
        });
      }
      cell.title=`${MONTH_NAMES[m]} ${day}: ${tasks.length} task${tasks.length!==1?'s':''}`;
      cell.onclick=()=>{S.scheduleDate=parseDate(ds);S.scheduleView='day';render();};
      miniGrid.appendChild(cell);
    }
    mCard.appendChild(miniGrid);
    grid.appendChild(mCard);
  }
  body.appendChild(grid);
}

function renderBrowse(body){
  backupWarningBanner(body);
  const toggle=el('div','browse-toggle');
  const modes=[['area','By Area/Room'],['freq','By Frequency/Type']];
  if((S.delegates||[]).length) modes.push(['delegate','By Delegate']);
  modes.forEach(([mode,label])=>{
    const b=el('button','browse-btn'+(S.browseMode===mode?' active':''));
    b.textContent=label;
    b.onclick=()=>{S.browseMode=mode;render();};
    toggle.appendChild(b);
  });
  body.appendChild(toggle);

  // Include pending/unscheduled in all views
  const allTasksForBrowse=S.tasks.filter(t=>isActiveTask(t)||isFutureTask(t)||isPendingTask(t));

  // ── BY FREQUENCY/TYPE ──
  if(S.browseMode==='freq'){
    const activeTasks=allTasksForBrowse;
    const strip=el('div','filter-strip');
    const allBtn=el('button','filter-btn'+(S.freqFilter==='all'?' active':''));
    allBtn.textContent='All';
    if(S.freqFilter==='all'){allBtn.style.background='var(--brown)';allBtn.style.color='var(--bg)';allBtn.style.borderColor='var(--brown)';}
    allBtn.onclick=()=>{S.freqFilter='all';render();};strip.appendChild(allBtn);
    const unschedBtn=el('button','filter-btn'+(S.freqFilter==='__unscheduled__'?' active':''));
    unschedBtn.textContent='Unscheduled';
    if(S.freqFilter==='__unscheduled__'){unschedBtn.style.background='#9a8870';unschedBtn.style.color='#fff';unschedBtn.style.borderColor='#9a8870';}
    unschedBtn.onclick=()=>{S.freqFilter='__unscheduled__';render();setTimeout(()=>unschedBtn.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}),50);};
    strip.appendChild(unschedBtn);
    FREQS.forEach(f=>{
      const b=el('button','filter-btn'+(S.freqFilter===f.id?' active':''));
      b.textContent=f.label;
      if(S.freqFilter===f.id){b.style.background=S.freqColors[f.id];b.style.color=S.darkMode?'#2a1f18':'#fff';b.style.borderColor=S.freqColors[f.id];}
      b.onclick=()=>{S.freqFilter=f.id;render();setTimeout(()=>b.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}),50);};
      strip.appendChild(b);
    });
    S.specialTypes.forEach(sp=>{
      const b=el('button','filter-btn'+(S.freqFilter===sp.id?' active':''));
      b.textContent=sp.label;
      if(S.freqFilter===sp.id){b.style.background=sp.color;b.style.color='#fff';b.style.borderColor=sp.color;}
      b.onclick=()=>{S.freqFilter=sp.id;render();setTimeout(()=>b.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}),50);};
      strip.appendChild(b);
    });
    const miniFilterBtn=el('button','filter-btn'+(S.freqFilter==='__mini__'?' active':''));
    miniFilterBtn.textContent='✦ Mini';
    if(S.freqFilter==='__mini__'){miniFilterBtn.style.background='#e8d800';miniFilterBtn.style.color='#3a3128';miniFilterBtn.style.borderColor='#e8d800';}
    miniFilterBtn.onclick=()=>{S.freqFilter='__mini__';render();setTimeout(()=>miniFilterBtn.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}),50);};
    strip.appendChild(miniFilterBtn);
    body.appendChild(strip);
    requestAnimationFrame(()=>{
      const activeBtn=strip.querySelector('.filter-btn[style*="var(--brown)"], .filter-btn[style*="background: rgb"]');
      if(activeBtn) activeBtn.scrollIntoView({behavior:'instant',inline:'center',block:'nearest'});
    });
    let filtered=S.freqFilter==='all'?activeTasks:
      S.freqFilter==='__unscheduled__'?S.tasks.filter(t=>isPendingTask(t)):
      S.freqFilter==='__mini__'?activeTasks.filter(t=>t.mini):
      S.specialTypes.find(s=>s.id===S.freqFilter)?activeTasks.filter(t=>t.special===S.freqFilter):
      activeTasks.filter(t=>t.freq===S.freqFilter);
    if(!filtered.length){const emp=el('div','empty');const tx=el('div','empty-text');tx.textContent='No cards here yet.';emp.appendChild(tx);body.appendChild(emp);return;}
    const freqGrid=el('div','cards-grid');
    filtered.forEach(task=>freqGrid.appendChild(renderCard(task,true)));
    body.appendChild(freqGrid);

  // ── BY AREA/ROOM ──
  }else if(S.browseMode==='area'){
    const activeTasks=allTasksForBrowse;
    const strip=el('div','filter-strip');
    const allBtn=el('button','filter-btn'+(S.areaFilter==='all'?' active':''));
    allBtn.textContent='All';
    if(S.areaFilter==='all'){allBtn.style.background='var(--brown)';allBtn.style.color='var(--bg)';allBtn.style.borderColor='var(--brown)';}
    allBtn.onclick=()=>{S.areaFilter='all';render();};strip.appendChild(allBtn);
    const usedAreas=[...new Set(activeTasks.map(t=>t.area))].sort();
    usedAreas.forEach(a=>{
      const b=el('button','filter-btn'+(S.areaFilter===a?' active':''));
      b.textContent=a;
      if(S.areaFilter===a){b.style.background='var(--brown)';b.style.color='var(--bg)';b.style.borderColor='var(--brown)';}
      b.onclick=()=>{S.areaFilter=a;render();setTimeout(()=>b.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}),50);};
      strip.appendChild(b);
    });
    body.appendChild(strip);
    requestAnimationFrame(()=>{
      const activeBtn=strip.querySelector('.filter-btn[style*="var(--brown)"]');
      if(activeBtn) activeBtn.scrollIntoView({behavior:'instant',inline:'center',block:'nearest'});
    });
    const areas=S.areaFilter==='all'?usedAreas:[S.areaFilter];
    areas.forEach(area=>{
      const tasks=sortByFreq(activeTasks.filter(t=>t.area===area));
      if(!tasks.length)return;
      const ah=el('div','area-heading');ah.textContent=area;body.appendChild(ah);
      const grid=el('div','cards-grid');
      tasks.forEach(task=>grid.appendChild(renderCard(task,false)));
      body.appendChild(grid);
    });

  // ── BY DELEGATE ──
  }else if(S.browseMode==='delegate'){
    const activeTasks=allTasksForBrowse;
    const delegates=S.delegates||[];
    if(!delegates.length){
      const emp=el('div','empty');const tx=el('div','empty-text');
      tx.textContent='No family members set up yet. Add them in Settings!';
      emp.appendChild(tx);body.appendChild(emp);return;
    }
    // Person selector strip
    const allPeople=['__me__',...delegates];
    const personStrip=el('div','filter-strip');
    allPeople.forEach(person=>{
      const label=person==='__me__'?'👤 Me':person;
      const isActive=(S.delegateFilter||'__me__')===person;
      const b=el('button','filter-btn'+(isActive?' active':''));
      b.textContent=label;
      if(isActive){b.style.background='var(--brown)';b.style.color='var(--bg)';b.style.borderColor='var(--brown)';}
      b.onclick=()=>{S.delegateFilter=person;render();setTimeout(()=>b.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}),50);};
      personStrip.appendChild(b);
    });
    body.appendChild(personStrip);
    // Sort toggle
    const sortToggle=el('div');
    sortToggle.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;';
    const sortLbl=el('span');sortLbl.style.cssText='font-size:11px;color:var(--brown-light);';sortLbl.textContent='Sort by:';
    const freqSortBtn=el('button','filter-btn'+(S.delegateSortMode!=='area'?' active':''));
    freqSortBtn.textContent='Frequency → Room';
    if(S.delegateSortMode!=='area'){freqSortBtn.style.background='var(--brown)';freqSortBtn.style.color='var(--bg)';}
    freqSortBtn.onclick=()=>{S.delegateSortMode='freq';render();};
    const areaSortBtn=el('button','filter-btn'+(S.delegateSortMode==='area'?' active':''));
    areaSortBtn.textContent='Room → Frequency';
    if(S.delegateSortMode==='area'){areaSortBtn.style.background='var(--brown)';areaSortBtn.style.color='var(--bg)';}
    areaSortBtn.onclick=()=>{S.delegateSortMode='area';render();};
    sortToggle.append(sortLbl,freqSortBtn,areaSortBtn);
    body.appendChild(sortToggle);
    // Get tasks for selected person
    const selectedPerson=S.delegateFilter||'__me__';
    const personTasks=selectedPerson==='__me__'
      ?activeTasks.filter(t=>!t.delegate)
      :activeTasks.filter(t=>t.delegate===selectedPerson);
    if(!personTasks.length){
      const none=el('div');none.style.cssText='font-size:13px;color:var(--brown-light);padding:20px 0;font-style:italic;text-align:center;';
      none.textContent=selectedPerson==='__me__'?'All tasks are delegated!':'No tasks assigned yet.';
      body.appendChild(none);
    }else if(S.delegateSortMode==='area'){
      const areas=[...new Set(personTasks.map(t=>t.area||'General'))].sort();
      areas.forEach(area=>{
        const areaTasks=sortByFreq(personTasks.filter(t=>(t.area||'General')===area));
        if(!areaTasks.length)return;
        const aHead=el('div','area-heading');aHead.textContent=area;body.appendChild(aHead);
        const grid=el('div','cards-grid');
        areaTasks.forEach(t=>grid.appendChild(renderCard(t,true)));
        body.appendChild(grid);
      });
    }else{
      const grid=el('div','cards-grid');
      sortByFreq(personTasks).forEach(t=>grid.appendChild(renderCard(t,true)));
      body.appendChild(grid);
    }
    if(selectedPerson!=='__me__'){
      const sendRow=el('div');sendRow.style.cssText='margin-top:16px;';
      const sendBtn=el('button','btn btn-ghost');
      sendBtn.style.cssText='font-family:"Lato",sans-serif;font-size:13px;padding:12px 20px;border-radius:8px;border:1px solid var(--border);cursor:pointer;-webkit-appearance:none;';
      sendBtn.textContent=`📤 Send ${selectedPerson}'s tasks for today`;
      sendBtn.onclick=()=>sendDelegateTasks(selectedPerson);
      sendRow.appendChild(sendBtn);body.appendChild(sendRow);
    }
  }

function renderPending(body){
  backupWarningBanner(body);
  const pending=S.tasks.filter(t=>isPendingTask(t));
  const future=S.tasks.filter(t=>isFutureTask(t));

  if(!pending.length&&!future.length){
    const emp=el('div','empty');
    const ic=el('div','empty-icon');ic.textContent='📋';
    const tx=el('div','empty-text');tx.textContent='No pending cards. All tasks are scheduled!';
    emp.append(ic,tx);body.appendChild(emp);return;
  }

  if(pending.length){
    body.appendChild(sectionHead('Unscheduled','#9a8870',pending.length));
    const pendNote=el('div');pendNote.style.cssText='font-size:12px;color:var(--brown-light);margin-bottom:10px;font-style:italic;';
    pendNote.textContent='These cards have no start date. Edit them to schedule.';
    body.appendChild(pendNote);
    const pendGrid=el('div','cards-grid');
    pending.forEach(task=>pendGrid.appendChild(renderCard(task,true)));
    body.appendChild(pendGrid);
  }

  if(future.length){
    body.appendChild(sectionHead('Scheduled — Not Yet Active','#6a9fd4',future.length));
    const futNote=el('div');futNote.style.cssText='font-size:12px;color:var(--brown-light);margin-bottom:10px;font-style:italic;';
    futNote.textContent='These cards will become active on their start date.';
    body.appendChild(futNote);
    future.sort((a,b)=>a.startDate.localeCompare(b.startDate));
    const futGrid=el('div','cards-grid');
    future.forEach(task=>{
      const card=renderCard(task,true);
      const sd=el('div');sd.style.cssText='font-size:10px;color:rgba(0,0,0,0.55);padding:4px 20px 6px;font-family:"Lato",sans-serif;font-style:italic;';
      sd.textContent='Starts: '+parseDate(task.startDate).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
      card.appendChild(sd);
      futGrid.appendChild(card);
    });
    body.appendChild(futGrid);
  }
}

// Send delegate's tasks via text/email
function sendDelegateTasks(name){
  const today=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const tasks=S.tasks.filter(t=>isActiveTask(t)&&wasPartOfToday(t)&&t.delegate===name&&!isDoneToday(t));
  if(!tasks.length){
    alert(`No outstanding tasks for ${name} today!`);return;
  }
  const todOrder=['dawn','morning','afternoon','evening',''];
  const sorted=[...tasks].sort((a,b)=>todOrder.indexOf(a.timeOfDay||'')-todOrder.indexOf(b.timeOfDay||''));
  const lines=sorted.map(t=>{
    const tod=TIME_OF_DAY.find(x=>x.id===(t.timeOfDay||''));
    const todLabel=tod&&tod.id?tod.label+' — ':'';
    const time=t.time?` (${t.time})`:'';
    const area=t.area?` [${t.area}]`:'';
    return `• ${todLabel}${t.name}${area}${time}`;
  }).join('\n');
  const msg=`Hi ${name}! Here are your tasks for ${today}:\n\n${lines}\n\nThanks! 🌸\n\n(Sent from The Card File — standard carrier rates may apply)`;
  // Open Messages/Mail with pre-filled message
  window.location.href=`sms:?body=${encodeURIComponent(msg)}`;
}
function showColorPicker(type,id,currentColor){
  const bd=el('div','backdrop');
  bd.onclick=e=>{if(e.target===bd)bd.remove();};
  const modal=el('div','modal');
  const title=el('div','modal-title');title.textContent='Choose Color';
  const sub=el('div','modal-sub');
  if(type==='freq'){const f=FREQS.find(f=>f.id===id);sub.textContent=f?`${f.label} — ${f.name}`:'Frequency';}
  else{const sp=S.specialTypes.find(s=>s.id===id);sub.textContent=sp?sp.label+' cards':'Special';}
  const grid=el('div','color-grid');
  COLOR_PALETTE.forEach(c=>{
    const sw=el('div','color-swatch'+(c===currentColor?' selected':''));
    sw.style.background=c;
    sw.onclick=()=>{
      if(type==='freq'){S.freqColors[id]=c;}
      else{const sp=S.specialTypes.find(s=>s.id===id);if(sp)sp.color=c;}
      save();bd.remove();render();
    };
    grid.appendChild(sw);
  });
  modal.append(title,sub,grid);bd.appendChild(modal);document.body.appendChild(bd);
}

function floralPageTitle(body,titleText){
  const wrap=el('div');
  wrap.style.cssText='text-align:center;margin-bottom:20px;';
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 320 80');
  svg.setAttribute('width','100%');
  svg.style.cssText='max-width:320px;display:block;margin:0 auto;overflow:visible;';
  const W=320,H=80;
  const isLight=!S.darkMode;
  const acc=S.darkAccent||'#c06878';
  const ra=parseInt(acc.slice(1,3),16),ga=parseInt(acc.slice(3,5),16),ba=parseInt(acc.slice(5,7),16);
  const lighter=`rgb(${Math.min(255,ra+50)},${Math.min(255,ga+50)},${Math.min(255,ba+50)})`;
  const rc=isLight?'#f0b0c0':lighter;
  const rd=isLight?'#d4788a':acc;
  const dp=isLight?'#b8a0d4':lighter;
  const lc=isLight?'#7a9a6a':'#a07880';
  const vine=isLight?'#5a7a4a':'#987080';
  function rb(x,y,r=6){return `<circle cx="${x}" cy="${y}" r="${r}" fill="${rc}" opacity=".85"/><circle cx="${x}" cy="${y}" r="${r*.55}" fill="${rd}" opacity=".9"/>`;}
  function daisy(x,y,r=9){return Array.from({length:10},(_,i)=>{const a=i*36*Math.PI/180;return `<ellipse cx="${x+Math.cos(a)*r}" cy="${y+Math.sin(a)*r}" rx="4" ry="2" fill="${dp}" opacity=".85" transform="rotate(${i*36} ${x+Math.cos(a)*r} ${y+Math.sin(a)*r})"/>`;}).join('')+`<circle cx="${x}" cy="${y}" r="4" fill="${isLight?'#e8d840':lighter}"/>`;}
  function sf(x,y,r=9){return Array.from({length:12},(_,i)=>{const a=i*30*Math.PI/180;return `<ellipse cx="${x+Math.cos(a)*r}" cy="${y+Math.sin(a)*r}" rx="4" ry="2" fill="${isLight?'#f5c842':lighter}" opacity=".9" transform="rotate(${i*30} ${x+Math.cos(a)*r} ${y+Math.sin(a)*r})"/>`;}).join('')+`<circle cx="${x}" cy="${y}" r="5" fill="${isLight?'#8B6914':acc}"/>`;}
  function pansy(x,y,s=.75){return `<ellipse cx="${x-7*s}" cy="${y-4*s}" rx="${8*s}" ry="${5*s}" fill="${isLight?'#7060c0':acc}" opacity=".8"/><ellipse cx="${x+7*s}" cy="${y-4*s}" rx="${8*s}" ry="${5*s}" fill="${isLight?'#7060c0':acc}" opacity=".8"/><ellipse cx="${x}" cy="${y+5*s}" rx="${8*s}" ry="${5*s}" fill="${isLight?'#5048a8':rd}" opacity=".85"/><ellipse cx="${x-6*s}" cy="${y+2*s}" rx="${6*s}" ry="${4*s}" fill="${isLight?'#8878d0':lighter}" opacity=".7"/><ellipse cx="${x+6*s}" cy="${y+2*s}" rx="${6*s}" ry="${4*s}" fill="${isLight?'#8878d0':lighter}" opacity=".7"/><circle cx="${x}" cy="${y+1*s}" r="${2.5*s}" fill="${isLight?'#f5e87a':lighter}"/>`;}
  function leaf(x,y,rx,ry,rot){return `<ellipse cx="${x}" cy="${y}" rx="${rx}" ry="${ry}" fill="${lc}" opacity=".72" transform="rotate(${rot} ${x} ${y})"/>`;}

  svg.innerHTML=`
    <path d="M20 ${H/2} Q${W*.12} 20 ${W*.28} ${H/2} Q${W*.15} ${H*.8} 20 ${H/2}" stroke="${vine}" stroke-width="1.2" fill="none" opacity=".4"/>
    <path d="M${W-20} ${H/2} Q${W*.88} 20 ${W*.72} ${H/2} Q${W*.85} ${H*.8} ${W-20} ${H/2}" stroke="${vine}" stroke-width="1.2" fill="none" opacity=".4"/>
    ${leaf(18,H/2-8,13,6,-30)}${leaf(30,H/2-18,11,5,10)}${leaf(22,H/2+10,12,5,40)}
    ${leaf(W-18,H/2-8,13,6,30)}${leaf(W-30,H/2-18,11,5,-10)}${leaf(W-22,H/2+10,12,5,-40)}
    ${rb(42,H/2-14,5)}${rb(28,H/2+8,4)}
    ${rb(W-42,H/2-14,5)}${rb(W-28,H/2+8,4)}
    ${daisy(62,H/2-8,8)}${daisy(W-62,H/2-8,8)}
    ${sf(W/2-60,H/2+2,7)}${sf(W/2+60,H/2+2,7)}
    ${pansy(W/2-80,H/2-5,.65)}${pansy(W/2+80,H/2-5,.65)}
    ${leaf(W/2-40,14,10,5,-15)}${leaf(W/2+40,14,10,5,15)}
    ${rb(W/2-20,10,4)}${rb(W/2+20,10,4)}
  `;

  const fo=document.createElementNS('http://www.w3.org/2000/svg','foreignObject');
  fo.setAttribute('x','60');fo.setAttribute('y','18');
  fo.setAttribute('width','200');fo.setAttribute('height','44');
  fo.innerHTML=`<div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--text);text-align:center;line-height:1.3;">${titleText}</div>`;
  svg.appendChild(fo);
  wrap.appendChild(svg);
  body.appendChild(wrap);
}

  const floral=document.createElementNS('http://www.w3.org/2000/svg','svg');
  floral.setAttribute('preserveAspectRatio','none');
  floral.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;border-radius:12px;pointer-events:none;z-index:0;';

  function buildFloralSVG(W,H){
    function rosebud(x,y,r=8){return `<circle cx="${x}" cy="${y}" r="${r}" fill="#f0b0c0" opacity=".8"/><circle cx="${x}" cy="${y}" r="${r*.6}" fill="#d4788a" opacity=".9"/>`;}
    function daisy(x,y,r=11,color='#b8a0d4'){return Array.from({length:10},(_,i)=>{const a=i*36*Math.PI/180;return `<ellipse cx="${x+Math.cos(a)*r}" cy="${y+Math.sin(a)*r}" rx="5" ry="2.5" fill="${color}" opacity=".85" transform="rotate(${i*36} ${x+Math.cos(a)*r} ${y+Math.sin(a)*r})"/>`;}).join('')+`<circle cx="${x}" cy="${y}" r="5" fill="#e8d840"/>`;}
    function sunflower(x,y,r=12){return Array.from({length:12},(_,i)=>{const a=i*30*Math.PI/180;return `<ellipse cx="${x+Math.cos(a)*r}" cy="${y+Math.sin(a)*r}" rx="5" ry="2.5" fill="#f5c842" opacity=".9" transform="rotate(${i*30} ${x+Math.cos(a)*r} ${y+Math.sin(a)*r})"/>`;}).join('')+`<circle cx="${x}" cy="${y}" r="6" fill="#8B6914"/>`;}
    function pansy(x,y,s=1){return `<ellipse cx="${x-8*s}" cy="${y-5*s}" rx="${9*s}" ry="${6*s}" fill="#7060c0" opacity=".8"/><ellipse cx="${x+8*s}" cy="${y-5*s}" rx="${9*s}" ry="${6*s}" fill="#7060c0" opacity=".8"/><ellipse cx="${x}" cy="${y+6*s}" rx="${9*s}" ry="${6*s}" fill="#5048a8" opacity=".85"/><ellipse cx="${x-7*s}" cy="${y+3*s}" rx="${7*s}" ry="${5*s}" fill="#8878d0" opacity=".7"/><ellipse cx="${x+7*s}" cy="${y+3*s}" rx="${7*s}" ry="${5*s}" fill="#8878d0" opacity=".7"/><circle cx="${x}" cy="${y+2*s}" r="${3*s}" fill="#f5e87a"/>`;}
    function leaf(x,y,rx,ry,rot){return `<ellipse cx="${x}" cy="${y}" rx="${rx}" ry="${ry}" fill="#7a9a6a" opacity=".7" transform="rotate(${rot} ${x} ${y})"/>`;}
    const m=H/2;
    return `
      <path d="M30 0 Q0 ${H*.25} 20 ${m} Q0 ${H*.75} 30 ${H}" stroke="#5a7a4a" stroke-width="1.5" fill="none" opacity=".45"/>
      <path d="M${W-30} 0 Q${W} ${H*.25} ${W-20} ${m} Q${W} ${H*.75} ${W-30} ${H}" stroke="#5a7a4a" stroke-width="1.5" fill="none" opacity=".45"/>
      <path d="M0 30 Q${W*.25} 10 ${W/2} 25 Q${W*.75} 10 ${W} 30" stroke="#5a7a4a" stroke-width="1.2" fill="none" opacity=".4"/>
      <path d="M0 ${H-30} Q${W*.25} ${H-10} ${W/2} ${H-20} Q${W*.75} ${H-10} ${W} ${H-30}" stroke="#5a7a4a" stroke-width="1.2" fill="none" opacity=".4"/>
      ${leaf(25,20,16,8,-30)}${leaf(50,12,13,7,15)}${leaf(90,18,14,7,-10)}
      ${leaf(W-25,20,16,8,30)}${leaf(W-50,12,13,7,-15)}${leaf(W-90,18,14,7,10)}
      ${leaf(W/2-30,10,14,7,5)}${leaf(W/2+30,10,14,7,-5)}
      ${rosebud(38,42,7)}${rosebud(70,28,6)}${rosebud(W-38,42,7)}${rosebud(W-70,28,6)}
      ${daisy(W/2,22,10,'#b8a0d4')}${sunflower(130,25,10)}${sunflower(W-130,25,10)}
      ${pansy(200,30,0.8)}${pansy(W-200,30,0.8)}
      ${leaf(12,m*.4,15,8,40)}${leaf(22,m*.5,12,6,-20)}${leaf(10,m*.8,14,7,50)}${leaf(22,m*.9,11,6,-30)}
      ${leaf(12,m*1.2,15,8,35)}${leaf(22,m*1.3,12,6,-15)}${leaf(10,m*1.6,14,7,45)}${leaf(22,m*1.5,11,6,-25)}
      ${rosebud(28,m*.44,7)}${daisy(20,m*.76,9,'#c8b0e4')}${sunflower(25,m,9)}${pansy(22,m*1.44,.75)}${rosebud(28,m*1.76,6)}
      ${leaf(W-12,m*.4,15,8,-40)}${leaf(W-22,m*.5,12,6,20)}${leaf(W-10,m*.8,14,7,-50)}${leaf(W-22,m*.9,11,6,30)}
      ${leaf(W-12,m*1.2,15,8,-35)}${leaf(W-22,m*1.3,12,6,15)}${leaf(W-10,m*1.6,14,7,-45)}${leaf(W-22,m*1.5,11,6,25)}
      ${rosebud(W-28,m*.44,7)}${daisy(W-20,m*.76,9,'#c8b0e4')}${sunflower(W-25,m,9)}${pansy(W-22,m*1.44,.75)}${rosebud(W-28,m*1.76,6)}
      ${leaf(25,H-20,16,8,30)}${leaf(55,H-12,13,7,-15)}${leaf(90,H-18,14,7,10)}
      ${leaf(W-25,H-20,16,8,-30)}${leaf(W-55,H-12,13,7,15)}${leaf(W-90,H-18,14,7,-10)}
      ${leaf(W/2-30,H-10,14,7,-5)}${leaf(W/2+30,H-10,14,7,5)}
      ${rosebud(40,H-40,7)}${rosebud(72,H-26,6)}${rosebud(W-40,H-40,7)}${rosebud(W-72,H-26,6)}

      ${pansy(210,H-32,.8)}${pansy(W-210,H-32,.8)}`;

  // Gentle sponsors link

  sponsorLink.style.cssText='text-align:center;margin-top:16px;padding-top:14px;border-top:1px solid rgba(90,74,56,0.2);font-family:"Lato",sans-serif;font-size:11px;color:#9a8870;line-height:1.6;';
  sponsorLink.innerHTML='If you enjoy The Card File and would like to support its creator,<br>you can <a href="https://github.com/sponsors/cinnamontoasty" target="_blank" style="color:#5a4a38;font-weight:600;text-decoration:underline;">buy Beth a coffee ☕</a> — always optional, never expected. 🌸';
  content.appendChild(sponsorLink);

  // Close button (X) top right
  const closeBtn=el('button');
  closeBtn.style.cssText='position:absolute;top:14px;right:14px;background:rgba(58,49,40,0.15);border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;color:#3a3128;display:flex;align-items:center;justify-content:center;z-index:2;line-height:1;';
  closeBtn.textContent='×';closeBtn.title='Close';
  closeBtn.onclick=()=>{
    localStorage.setItem('cf4_welcomeSeen','1');
    S.showWelcome=false;
    if(S.firstTime){S.tab='walkthrough';}
    render();
  };
  modal.appendChild(closeBtn);

  modal.appendChild(content);bd.appendChild(modal);

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const h=modal.offsetHeight||700,w=modal.offsetWidth||480;
    floral.setAttribute('viewBox',`0 0 ${w} ${h}`);
    floral.innerHTML=buildFloralSVG(w,h);
    if(window.ResizeObserver){
      const ro=new ResizeObserver(()=>{
        const nh=modal.offsetHeight,nw=modal.offsetWidth;
        floral.setAttribute('viewBox',`0 0 ${nw} ${nh}`);
        floral.innerHTML=buildFloralSVG(nw,nh);
      });ro.observe(modal);
    }
  }));
  return bd;
}

// ══════════════════════════════════════════
// TASK MODAL (ADD / EDIT)
// ══════════════════════════════════════════
function buildModal(data,isEdit){
  const bd=el('div','backdrop');
  bd.onclick=e=>{if(e.target===bd){isEdit?S.editTask=null:S.showAdd=false;render();}};
  const modal=el('div','modal');
  const title=el('div','modal-title');title.textContent=isEdit?'Edit Card':'New Card';
  const sub=el('div','modal-sub');sub.textContent=isEdit?'Modify this task':'Add a task to your card file';
  modal.append(title,sub);

  // Two-column grid on wider screens
  const fieldsGrid=el('div','modal-fields-grid');

  // Name
  const f1=el('div','field');const l1=el('label');l1.textContent='Task Name';
  const i1=el('input');i1.type='text';i1.value=data.name||'';i1.placeholder='e.g., Wipe stovetop';
  i1.oninput=e=>data.name=e.target.value;f1.append(l1,i1);fieldsGrid.appendChild(f1);

  // Area
  const f2=el('div','field');const l2=el('label');l2.textContent='Area / Room';
  const sel2=el('select');
  const allAreas=[...new Set([...S.areas,...(data.area?[data.area]:[])])].sort();
  allAreas.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;if(a===data.area)o.selected=true;sel2.appendChild(o);});
  const customOpt=document.createElement('option');customOpt.value='__custom__';customOpt.textContent='+ Add new area...';sel2.appendChild(customOpt);
  sel2.onchange=e=>{
    if(e.target.value==='__custom__'){
      const val=prompt('Enter new room/area name:');
      if(val&&val.trim()){
        const v=val.trim();
        if(!S.areas.includes(v)){S.areas.push(v);save();}
        data.area=v;
        const o=document.createElement('option');o.value=v;o.textContent=v;o.selected=true;
        sel2.insertBefore(o,customOpt);sel2.value=v;
      }else{sel2.value=data.area||allAreas[0];}
    }else{data.area=e.target.value;}
  };
  f2.append(l2,sel2);fieldsGrid.appendChild(f2);

  // Frequency
  const f3=el('div','field');const l3=el('label');l3.textContent='Frequency';
  const sel3=el('select');
  FREQS.forEach(f=>{const o=document.createElement('option');o.value=f.id;o.textContent=`${f.label} — ${f.name}`;if(f.id===data.freq)o.selected=true;sel3.appendChild(o);});
  sel3.onchange=e=>{data.freq=e.target.value;recalcNextDue();};f3.append(l3,sel3);fieldsGrid.appendChild(f3);

  // Day of week / month — appears right under frequency, full width
  const dayFieldWrap=el('div');dayFieldWrap.style.cssText='grid-column:1/-1;';modal.appendChild(fieldsGrid);
  const dayMonthSection=el('div');dayMonthSection.style.cssText='';
  const dayFieldWrap2=el('div');dayMonthSection.appendChild(dayFieldWrap2);
  const monthFieldWrap=el('div');dayMonthSection.appendChild(monthFieldWrap);
  modal.appendChild(dayMonthSection);
  // Re-open fieldsGrid for remaining fields
  const fieldsGrid2=el('div','modal-fields-grid');

  // Time
  const f4=el('div','field');const l4=el('label');l4.textContent="Time (e.g., 5', 30', 1hr)";
  const i4=el('input');i4.type='text';i4.value=data.time||'';i4.placeholder="10'";
  i4.oninput=e=>data.time=e.target.value;f4.append(l4,i4);fieldsGrid2.appendChild(f4);

  // Supplies
  const f5=el('div','field');const l5=el('label');l5.textContent='Equipment / Supplies';
  const ta=el('textarea');ta.value=data.supplies||'';ta.placeholder='e.g., Broom, dustpan, cleaner';
  ta.oninput=e=>data.supplies=e.target.value;f5.append(l5,ta);fieldsGrid2.appendChild(f5);

  // Card type
  const f6=el('div','field');const l6=el('label');l6.textContent='Card Type';
  const sel6=el('select');
  [['','Standard (frequency color)'],...S.specialTypes.map(s=>[s.id,s.label])].forEach(([val,txt2])=>{
    const o=document.createElement('option');o.value=val;o.textContent=txt2;if(val===data.special)o.selected=true;sel6.appendChild(o);
  });
  sel6.onchange=e=>data.special=e.target.value;f6.append(l6,sel6);fieldsGrid.appendChild(f6);

  modal.appendChild(fieldsGrid);

  // Helper: show a confirmation dialog with optional "don't ask again" checkbox
  function confirmAction(msg,storageKey,onConfirm){
    if(localStorage.getItem(storageKey)==='1'){onConfirm();return;}
    const bd2=el('div','backdrop');
    bd2.style.zIndex='201';
    const box=el('div');
    box.style.cssText='background:var(--card-bg);border-radius:12px;padding:24px 20px;max-width:340px;width:90%;margin:auto;margin-top:20vh;box-shadow:0 8px 32px rgba(0,0,0,0.3);';
    const msg2=el('div');msg2.style.cssText='font-size:14px;color:var(--text);line-height:1.6;margin-bottom:18px;';msg2.textContent=msg;
    const cbRow=el('div');cbRow.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:18px;cursor:pointer;';
    const cb=document.createElement('input');cb.type='checkbox';cb.style.cssText='width:16px;height:16px;accent-color:var(--gold);cursor:pointer;';
    const cbl=el('span');cbl.style.cssText='font-size:12px;color:var(--brown-light);';cbl.textContent="Don't ask me this again";
    cbRow.append(cb,cbl);cbRow.onclick=()=>cb.checked=!cb.checked;
    const btnRow=el('div');btnRow.style.cssText='display:flex;gap:8px;';
    const cancelBtn=el('button','btn btn-ghost');cancelBtn.style.cssText+='flex:1;';cancelBtn.textContent='Cancel';
    cancelBtn.onclick=()=>bd2.remove();
    const okBtn=el('button','btn btn-primary');okBtn.style.cssText+='flex:1;';okBtn.textContent='Yes, continue';
    okBtn.onclick=()=>{
      if(cb.checked) localStorage.setItem(storageKey,'1');
      bd2.remove();onConfirm();
    };
    btnRow.append(cancelBtn,okBtn);
    box.append(msg2,cbRow,btnRow);
    bd2.appendChild(box);document.body.appendChild(bd2);
  }

  // Helper: calculate next due date from a start date and frequency
  function calcNextFromStart(startDateStr,freqId){
    if(!startDateStr) return '';
    const f=fById(freqId||data.freq);
    // First occurrence is the start date itself
    return startDateStr;
  }

  // Auto-recalc next due date display when start date or frequency changes
  function recalcNextDue(){
    if(!data.startDate) return;
    // Set base nextDueDate to startDate first
    data.nextDueDate=data.startDate;
    // Then apply day-of-week or day-of-month if set
    const freq=data.freq||sel3.value;
    if(['w','2w','3w'].includes(freq)){
      if(freq==='w'&&data.weekday!=null){
        data.nextDueDate=nextWeekday(parseDate(data.startDate),data.weekday);
      }else if(freq==='2w'&&data.weekdays&&data.weekdays.filter(d=>d!=null).length===2){
        const candidates=data.weekdays.filter(d=>d!=null).map(d=>nextWeekday(parseDate(data.startDate),d));
        data.nextDueDate=candidates.sort()[0];
      }else if(freq==='3w'&&data.weekdays&&data.weekdays.filter(d=>d!=null).length===3){
        const candidates=data.weekdays.filter(d=>d!=null).map(d=>nextWeekday(parseDate(data.startDate),d));
        data.nextDueDate=candidates.sort()[0];
      }
    }else if(['m','2m','eom'].includes(freq)){
      if(data.monthday){
        const skipMonths=freq==='eom'?2:1;
        const d=parseDate(data.startDate);
        const daysInMonth=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
        const clamped=Math.min(data.monthday,daysInMonth);
        const tryDate=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(clamped).padStart(2,'0')}`;
        data.nextDueDate=tryDate>=data.startDate?tryDate:nextMonthDay(d,data.monthday,skipMonths);
      }
    }
    if(nextDueDisplay) nextDueDisplay.textContent=formatNextDue(data.nextDueDate,data.freq);
    if(manualDateInput) manualDateInput.value=data.nextDueDate;
  }

  function formatNextDue(dateStr2,freqId){
    if(!dateStr2) return '—';
    const f=fById(freqId);
    const d=parseDate(dateStr2);
    const label=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    // Show following occurrence too
    const next2=dateStr(addDays(d,Math.ceil(f.days)));
    const next2Label=parseDate(next2).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    return `${label} — then ${next2Label}`;
  }

  let nextDueDisplay=null;
  let manualDateInput=null;

  // Start date — with clear button
  const f7=el('div','field');
  const l7=el('label');l7.textContent='Start Date (leave blank to save as Pending)';
  const f7row=el('div');f7row.style.cssText='display:flex;align-items:center;gap:8px;';
  const i7=el('input');i7.type='date';i7.value=data.startDate||'';i7.style.flex='1';
  i7.oninput=e=>{
    data.startDate=e.target.value;
    recalcNextDue();
  };
  const clr7=el('button');
  clr7.type='button';
  clr7.style.cssText='font-family:"Lato",sans-serif;font-size:11px;font-weight:700;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--brown-light);cursor:pointer;white-space:nowrap;-webkit-appearance:none;flex-shrink:0;';
  clr7.textContent='✕ Clear';
  clr7.onclick=e=>{
    e.preventDefault();
    if(!data.startDate)return;
    confirmAction(
      'Clearing the start date will move this card to Pending and remove it from future scheduling. Clear it?',
      'cf4_noConfirmClearDate',
      ()=>{
        data.startDate='';
        data.nextDueDate='';
        i7.value='';
        if(nextDueDisplay) nextDueDisplay.textContent='—';
      }
    );
  };
  f7row.append(i7,clr7);f7.append(l7,f7row);modal.appendChild(f7);

  // Next Due Date — read-only display with auto-recalc
  // Only shown when there's a start date
  if(data.startDate||isEdit){
    const f7b=el('div','field');
    const l7b=el('label');l7b.textContent='Next Due Date';
    nextDueDisplay=el('div');
    nextDueDisplay.style.cssText='font-size:13px;color:var(--text);padding:10px 12px;background:var(--parchment-dark);border-radius:8px;border:1px solid var(--border);margin-bottom:6px;line-height:1.5;';
    nextDueDisplay.textContent=data.nextDueDate?formatNextDue(data.nextDueDate,data.freq):'Set a start date to calculate';

    // "Reschedule manually" toggle
    const reschedLink=el('button');
    reschedLink.type='button';
    reschedLink.style.cssText='font-family:"Lato",sans-serif;font-size:11px;color:var(--brown-light);background:none;border:none;padding:0;cursor:pointer;text-decoration:underline;-webkit-appearance:none;';
    reschedLink.textContent='Reschedule manually';
    let manualVisible=false;
    const manualWrap=el('div');manualWrap.style.display='none';
    manualWrap.style.marginTop='8px';
    // Row: date input + clear button side by side
    const manualRow=el('div');manualRow.style.cssText='display:flex;align-items:center;gap:8px;';
    manualDateInput=el('input');manualDateInput.type='date';
    manualDateInput.value=data.nextDueDate||'';
    manualDateInput.style.cssText='flex:1;font-family:"Lato",sans-serif;font-size:13px;border:1px solid var(--gold);border-radius:8px;padding:8px 12px;background:var(--bg);color:var(--text);outline:none;';
    const manualClr=el('button');
    manualClr.type='button';
    manualClr.style.cssText='font-family:"Lato",sans-serif;font-size:11px;font-weight:700;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--brown-light);cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-appearance:none;';
    manualClr.textContent='✕ Clear';
    manualClr.onclick=e=>{
      e.preventDefault();
      confirmAction(
        'Clearing the next due date will move this card to Pending and remove it from future scheduling. Clear it?',
        'cf4_noConfirmClearDate',
        ()=>{
          data.startDate='';data.nextDueDate='';
          i7.value='';manualDateInput.value='';
          nextDueDisplay.textContent='—';
        }
      );
    };
    const manualNote=el('div');manualNote.style.cssText='font-size:11px;color:var(--brown-light);margin-top:4px;line-height:1.5;';
    manualNote.textContent='Changing this shifts the entire schedule forward from this date.';
    // Update immediately on change — no confirmation needed
    manualDateInput.oninput=e=>{
      const newVal=e.target.value;
      data.nextDueDate=newVal;
      delete data.originalDueDate;
      if(newVal) nextDueDisplay.textContent=formatNextDue(newVal,data.freq);
    };
    manualRow.append(manualDateInput,manualClr);
    manualWrap.append(manualRow,manualNote);
    reschedLink.onclick=e=>{
      e.preventDefault();
      manualVisible=!manualVisible;
      manualWrap.style.display=manualVisible?'block':'none';
      reschedLink.textContent=manualVisible?'Hide manual reschedule':'Reschedule manually';
    };
    f7b.append(l7b,nextDueDisplay,reschedLink,manualWrap);modal.appendChild(f7b);
  }

  // Time of day
  const f8=el('div','field');const l8=el('label');l8.textContent='Time of Day';
  const sel8=el('select');
  [['','No preference (Anytime)'],['dawn','🌅 Dawn'],['morning','🌞 Morning'],['afternoon','☀️ Afternoon'],['evening','🌙 Evening']].forEach(([val,txt2])=>{
    const o=document.createElement('option');o.value=val;o.textContent=txt2;
    if((data.timeOfDay||'')=== val)o.selected=true;sel8.appendChild(o);
  });
  sel8.onchange=e=>{data.timeOfDay=e.target.value;updateTod2Visibility();};
  f8.append(l8,sel8);modal.appendChild(f8);

  // Second time of day (only for 2/D)
  const f8b=el('div','field');
  const l8b=el('label');l8b.textContent='Second Time of Day (2/D only)';
  const sel8b=el('select');
  [['','None'],['dawn','🌅 Dawn'],['morning','🌞 Morning'],['afternoon','☀️ Afternoon'],['evening','🌙 Evening']].forEach(([val,txt2])=>{
    const o=document.createElement('option');o.value=val;o.textContent=txt2;
    if((data.timeOfDay2||'')=== val)o.selected=true;sel8b.appendChild(o);
  });
  sel8b.onchange=e=>data.timeOfDay2=e.target.value;
  f8b.append(l8b,sel8b);modal.appendChild(f8b);

  function updateTod2Visibility(){
    const is2d=(data.freq||sel3.value)==='2d';
    f8b.style.display=is2d?'block':'none';
    if(!is2d) data.timeOfDay2='';
  }
  // Also update when freq changes
  sel3.addEventListener('change',()=>{updateTod2Visibility();recalcNextDue();updateDayFields();});
  updateTod2Visibility();

  // ── DAY OF WEEK (W, 2/W, 3/W) ──
  const WDAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  function updateDayFields(){
    const freq=data.freq||sel3.value;
    dayFieldWrap2.innerHTML='';
    monthFieldWrap.innerHTML='';

    // Week-based frequencies
    if(['w','2w','3w'].includes(freq)){
      const count=freq==='w'?1:freq==='2w'?2:3;
      const label=el('label');label.textContent=(count>1?'Days':'Day')+' of Week (optional)';
      label.style.cssText='display:block;font-size:12px;font-weight:700;color:var(--brown-mid);margin-bottom:6px;';
      const note=el('div');note.style.cssText='font-size:11px;color:var(--brown-light);margin-bottom:8px;';
      note.textContent='Leave blank to use the start date as anchor.';
      dayFieldWrap2.append(label,note);
      const row=el('div');row.style.cssText='display:flex;gap:8px;flex-wrap:wrap;';
      const keys=count===1?['weekday']:count===2?['weekdays0','weekdays1']:['weekdays0','weekdays1','weekdays2'];
      keys.forEach((key,i)=>{
        const sel=el('select');
        sel.style.cssText='font-family:"Lato",sans-serif;font-size:13px;border:1px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--bg);color:var(--text);flex:1;min-width:120px;-webkit-appearance:auto;';
        [['','Any day'],...WDAYS.map((d,j)=>[String(j),d])].forEach(([val,txt2])=>{
          const o=document.createElement('option');o.value=val;o.textContent=txt2;
          // Get current value
          const cur=count===1?(data.weekday!=null?String(data.weekday):''):(data.weekdays&&data.weekdays[i]!=null?String(data.weekdays[i]):'');
          if(cur===val) o.selected=true;
          sel.appendChild(o);
        });
        sel.onchange=e=>{
          const v=e.target.value===''?null:parseInt(e.target.value);
          if(count===1){data.weekday=v;}
          else{if(!data.weekdays)data.weekdays=[];data.weekdays[i]=v;}
          recalcNextDue();
        };
        row.appendChild(sel);
      });
      dayFieldWrap2.appendChild(row);
    }

    // Month-based frequencies
    if(['m','2m','eom'].includes(freq)){
      const count=freq==='2m'?2:1;
      const label=el('label');label.textContent=`Day${count>1?' 1':''} of Month (optional, 1–31)`;
      label.style.cssText='display:block;font-size:12px;font-weight:700;color:var(--brown-mid);margin-bottom:6px;';
      const note=el('div');note.style.cssText='font-size:11px;color:var(--brown-light);margin-bottom:8px;';
      note.textContent='Leave blank to use the start date. Dates 29–31 adjust for shorter months.';
      monthFieldWrap.append(label,note);

      function makeMonthDayInput(currentVal,onCh,lbl2){
        const wrap=el('div');wrap.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px;';
        if(lbl2){const l=el('span');l.style.cssText='font-size:12px;color:var(--brown-mid);min-width:50px;';l.textContent=lbl2;wrap.appendChild(l);}
        const inp=el('input');inp.type='number';inp.min='1';inp.max='31';
        inp.value=currentVal||'';inp.placeholder='e.g. 15';
        inp.style.cssText='font-family:"Lato",sans-serif;font-size:13px;border:1px solid var(--border);border-radius:8px;padding:8px 12px;background:var(--bg);color:var(--text);width:80px;-webkit-appearance:none;';
        inp.oninput=e=>{
          const v=parseInt(e.target.value);
          onCh(isNaN(v)?null:Math.max(1,Math.min(31,v)));
          recalcNextDue();
        };
        const clrBtn=el('button');clrBtn.type='button';
        clrBtn.style.cssText='font-family:"Lato",sans-serif;font-size:11px;color:var(--brown-light);background:none;border:none;cursor:pointer;padding:0;-webkit-appearance:none;';
        clrBtn.textContent='✕ Clear';
        clrBtn.onclick=e=>{e.preventDefault();inp.value='';onCh(null);recalcNextDue();};
        wrap.append(inp,clrBtn);
        return wrap;
      }

      monthFieldWrap.appendChild(makeMonthDayInput(data.monthday,v=>data.monthday=v,null));
      if(count===2){
        const l2=el('label');l2.textContent='Day 2 of Month (optional)';
        l2.style.cssText='display:block;font-size:12px;font-weight:700;color:var(--brown-mid);margin:8px 0 6px;';
        monthFieldWrap.appendChild(l2);
        monthFieldWrap.appendChild(makeMonthDayInput(data.monthday2,v=>data.monthday2=v,null));
      }
    }
  }
  updateDayFields();

  // Delegate — only show if there are family members set up
  if((S.delegates||[]).length){
    const fdel=el('div','field');
    const ldel=el('label');ldel.textContent='Delegate to';
    const seldel=el('select');
    [['','No delegate (mine)'],...(S.delegates||[]).map(n=>[n,n])].forEach(([val,txt2])=>{
      const o=document.createElement('option');o.value=val;o.textContent=txt2;
      if((data.delegate||'')=== val)o.selected=true;seldel.appendChild(o);
    });
    seldel.onchange=e=>data.delegate=e.target.value;
    fdel.append(ldel,seldel);modal.appendChild(fdel);
  }

  // Mini — fixed for mobile: use a proper toggle button instead of checkbox
  const miniWrap=el('div');miniWrap.style.cssText='margin-bottom:14px;';
  const miniBtn=el('button');
  miniBtn.type='button';
  const updateMiniBtn=()=>{
    miniBtn.style.cssText=`width:100%;font-family:'Lato',sans-serif;font-size:13px;font-weight:${data.mini?'700':'400'};padding:12px 14px;border-radius:8px;border:${data.mini?'2px solid var(--gold)':'1.5px solid var(--border)'};background:${data.mini?'rgba(200,169,110,0.15)':'var(--bg)'};color:var(--text);cursor:pointer;text-align:left;-webkit-appearance:none;transition:all .2s;`;
    miniBtn.textContent=(data.mini?'✦ ':'○ ')+'Mini task (5–10 min, pick up anytime)';
  };
  updateMiniBtn();
  miniBtn.onclick=e=>{e.preventDefault();data.mini=!data.mini;updateMiniBtn();};
  miniWrap.appendChild(miniBtn);modal.appendChild(miniWrap);

  // Completion history editor (edit mode only)
  if(isEdit&&data.completions&&data.completions.length){
    const histSection=el('div');
    histSection.style.cssText='margin-bottom:14px;border-top:1px solid var(--border);padding-top:14px;';
    const histTitle=el('div');
    histTitle.style.cssText='font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--brown-light);margin-bottom:8px;';
    histTitle.textContent='Completion History — tap a date to correct it';
    histSection.appendChild(histTitle);
    const recent=[...data.completions].reverse().slice(0,8);
    recent.forEach((comp,revIdx)=>{
      const origIdx=data.completions.length-1-revIdx;
      const dateStr2=comp.slice(0,10);
      const dispDate=parseDate(dateStr2).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
      const row=el('div');
      row.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--border);';
      const dl=el('div');dl.style.cssText='font-size:13px;color:var(--text);';dl.textContent='✓ '+dispDate;
      const editDateBtn=el('button');
      editDateBtn.style.cssText='font-family:"Lato",sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card-bg);color:var(--brown-light);cursor:pointer;-webkit-appearance:none;';
      editDateBtn.textContent='Change date';
      editDateBtn.onclick=e=>{
        e.preventDefault();
        // Show date input inline
        const inp=document.createElement('input');inp.type='date';inp.value=dateStr2;
        inp.style.cssText='font-family:"Lato",sans-serif;font-size:13px;border:1px solid var(--gold);border-radius:6px;padding:6px 10px;background:var(--bg);color:var(--text);outline:none;';
        const confirmBtn=el('button');
        confirmBtn.style.cssText='font-family:"Lato",sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 12px;border-radius:6px;border:none;background:var(--gold);color:var(--brown);cursor:pointer;margin-left:6px;-webkit-appearance:none;';
        confirmBtn.textContent='Save';
        confirmBtn.onclick=ev=>{
          ev.preventDefault();
          if(inp.value&&inp.value!==dateStr2){
            data.completions[origIdx]=inp.value+'T12:00:00.000Z';
          }
          row.innerHTML='';row.append(dl);dl.textContent='✓ '+parseDate(inp.value||dateStr2).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
          const eb2=editDateBtn.cloneNode(true);eb2.onclick=editDateBtn.onclick;row.append(eb2);
        };
        row.innerHTML='';row.append(inp,confirmBtn);
      };
      const delBtn2=el('button');
      delBtn2.style.cssText='font-family:"Lato",sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;padding:5px 10px;border-radius:6px;border:1px solid rgba(180,60,60,0.3);background:none;color:#c0392b;cursor:pointer;margin-left:6px;-webkit-appearance:none;';
      delBtn2.textContent='Remove';
      delBtn2.onclick=e=>{
        e.preventDefault();
        data.completions.splice(origIdx,1);
        row.remove();
      };
      const btnWrap=el('div');btnWrap.style.cssText='display:flex;gap:4px;';
      btnWrap.append(editDateBtn,delBtn2);
      row.append(dl,btnWrap);histSection.appendChild(row);
    });
    if(data.completions.length>8){
      const more=el('div');more.style.cssText='font-size:11px;color:var(--brown-light);padding-top:6px;font-style:italic;';
      more.textContent=`...and ${data.completions.length-8} older completions`;
      histSection.appendChild(more);
    }
    modal.appendChild(histSection);
  }

  // Buttons
  const btns=el('div','modal-btns');
  const cancel=el('button','btn btn-ghost');cancel.textContent='Cancel';cancel.onclick=()=>{isEdit?S.editTask=null:S.showAdd=false;render();};
  const save=el('button','btn btn-primary');save.textContent=isEdit?'Save Changes':'Add Card';save.onclick=()=>isEdit?saveEdit():addTask();
  if(isEdit){
    const del=el('button','btn btn-danger');del.textContent='Delete';del.onclick=()=>deleteTask(data.id);btns.append(cancel,del,save);
  }else{btns.append(cancel,save);}
  modal.appendChild(btns);bd.appendChild(modal);setTimeout(()=>i1.focus(),60);return bd;
}

// ══════════════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════════════
function render(){
  const app=document.getElementById('app');app.innerHTML='';
  // Remove old side flowers
  document.querySelectorAll('.side-flowers').forEach(e=>e.remove());

  // Install hint — show device-appropriate instructions
  if(S.showInstall){
    const bar=el('div','install-hint');
    const txt2=el('div','install-hint-text');
    const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent);
    const isAndroid=/Android/.test(navigator.userAgent);
    if(isIOS){
      txt2.innerHTML='📌 <strong>Save to Home Screen:</strong> Tap the Share button (□↑) in Safari → <em>Add to Home Screen</em>';
    }else if(isAndroid){
      txt2.innerHTML='📌 <strong>Save to Home Screen:</strong> Tap the menu (⋮) in Chrome → <em>Add to Home screen</em>';
    }else{
      txt2.innerHTML='📌 <strong>Install as App:</strong> In Chrome or Edge, look for the install icon (⊕) in the address bar → click <em>Install</em>';
    }
    const x=el('button','install-hint-close');x.textContent='×';
    x.onclick=()=>{S.showInstall=false;localStorage.setItem('cf4_installOk','1');render();};
    bar.append(txt2,x);app.appendChild(bar);
  }

  // Daily notification — rebuild from due tasks if needed
  const dueTodayForNotif=S.tasks.filter(t=>isActiveTask(t)&&wasPartOfToday(t));
  if(dueTodayForNotif.length&&!S._notification){
    S._notification=dueTodayForNotif;
  }

  // Header
  const header=el('div','header');
  const htop=el('div','header-top');
  const hleft=el('div');
  const ey=el('div','eyebrow');ey.textContent='Household Management';
  const ht=el('div','htitle');ht.textContent='The Card File';
  hleft.append(ey,ht);
  const hr=el('div','hright');
  const hd=el('div','hdate');hd.textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const dueCount=S.tasks.filter(t=>isActiveTask(t)&&isDueToday(t)&&!isDoneToday(t)).length;
  const hdu=el('div','hdue');
  hdu.textContent=`${dueCount} task${dueCount!==1?'s':''} due`;
  hdu.title='Click to show/hide today\'s task list';
  hdu.onclick=()=>{
    const due=S.tasks.filter(t=>isActiveTask(t)&&wasPartOfToday(t));
    if(due.length){
      if(!S._notification) S._notification=due;
      S.notificationDismissed=!S.notificationDismissed;
      render();
    }
  };
  hr.append(hd,hdu);

  // Header popup buttons
  const miniTasksBtn=el('button');
  miniTasksBtn.style.cssText='font-family:"Lato",sans-serif;font-size:11px;font-weight:700;padding:5px 10px;border-radius:12px;border:1.5px solid #e8d800;background:rgba(232,216,0,0.15);color:#e8d800;cursor:pointer;-webkit-appearance:none;white-space:nowrap;margin-left:8px;';
  miniTasksBtn.textContent='✦ Mini';
  miniTasksBtn.title='Show all mini tasks';
  miniTasksBtn.onclick=()=>showMiniTasksPopup();
  hr.appendChild(miniTasksBtn);

  const asNeededTasks=S.tasks.filter(t=>isAsNeededTask(t));
  if(asNeededTasks.length){
    const anBtn=el('button');
    anBtn.style.cssText='font-family:"Lato",sans-serif;font-size:11px;font-weight:700;padding:5px 10px;border-radius:12px;border:1.5px solid var(--border);background:rgba(176,168,152,0.15);color:var(--brown-light);cursor:pointer;-webkit-appearance:none;white-space:nowrap;margin-left:6px;';
    anBtn.textContent='◇ As Needed';
    anBtn.title='Show as-needed tasks';
    anBtn.onclick=()=>showAsNeededPopup();
    hr.appendChild(anBtn);
  }

  htop.append(hleft,hr);

  const tabs=el('div','tabs');
  const mainTabs=[['today','Today'],['schedule','Schedule'],['browse','Browse'],['pending','Pending']];
  mainTabs.forEach(([id,label])=>{
    const tab=el('div','tab'+(S.tab===id?' active':''));
    tab.textContent=label;tab.onclick=()=>{S.tab=id;render();};tabs.appendChild(tab);
  });
  const settingsTab=el('div','tab'+(S.tab==='settings'||S.tab==='howto'||S.tab==='walkthrough'?' active':''));
  settingsTab.textContent='⚙ Settings';
  settingsTab.style.marginLeft='2px';
  settingsTab.onclick=()=>{S.tab='settings';render();};tabs.appendChild(settingsTab);
  header.append(htop,tabs);app.appendChild(header);

  // Daily notification — appears AFTER header, only if not dismissed
  if(S._notification&&!S.notificationDismissed){
    const nb=el('div','notif');
    const bd2=el('div','notif-body');
    const t=el('div','notif-title');t.textContent='Tasks due today — '+new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

    // Build accent-aware flower garland SVG — truly full width using JS measurement
    function makeGarland(){
      const isLight=!S.darkMode;
      const acc=S.darkAccent||'#c06878';
      const ra=parseInt(acc.slice(1,3),16),ga=parseInt(acc.slice(3,5),16),ba=parseInt(acc.slice(5,7),16);
      const lighter=`rgb(${Math.min(255,ra+55)},${Math.min(255,ga+55)},${Math.min(255,ba+55)})`;
      const rc=isLight?'#f0b0c0':lighter;
      const rd=isLight?'#d4788a':acc;
      const dp=isLight?'#b8a0d4':lighter;
      const dc=isLight?'#e8d840':lighter;
      const sf=isLight?'#f5c842':lighter;
      const lc=isLight?'#7a9a6a':'#907878';
      const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      // Use a wide viewBox with many flowers — SVG scales to fill width
      const VW=800;
      const positions=[20,60,100,140,180,220,260,300,340,380,420,460,500,540,580,620,660,700,740,780];
      svg.setAttribute('viewBox',`0 0 ${VW} 16`);
      svg.setAttribute('preserveAspectRatio','xMidYMid meet');
      svg.style.cssText='width:100%;height:16px;display:block;';
      svg.innerHTML=`
        <path d="M0 8 Q${VW/2} 2 ${VW} 8" stroke="${lc}" stroke-width="1" fill="none" opacity=".5"/>
        ${positions.map((x,i)=>{
          if(i%3===0) return `<circle cx="${x}" cy="8" r="4" fill="${rc}" opacity=".85"/><circle cx="${x}" cy="8" r="2.2" fill="${rd}" opacity=".9"/>`;
          if(i%3===1) return Array.from({length:8},(_,j)=>{const a=j*45*Math.PI/180;return `<ellipse cx="${x+Math.cos(a)*5}" cy="${8+Math.sin(a)*5}" rx="2.5" ry="1.2" fill="${dp}" opacity=".8" transform="rotate(${j*45} ${x+Math.cos(a)*5} ${8+Math.sin(a)*5})"/>`;}).join('')+`<circle cx="${x}" cy="8" r="2.5" fill="${dc}"/>`;
          return Array.from({length:8},(_,j)=>{const a=j*45*Math.PI/180;return `<ellipse cx="${x+Math.cos(a)*4}" cy="${8+Math.sin(a)*4}" rx="2" ry="1" fill="${sf}" opacity=".85" transform="rotate(${j*45} ${x+Math.cos(a)*4} ${8+Math.sin(a)*4})"/>`;}).join('')+`<circle cx="${x}" cy="8" r="2" fill="#8B6914"/>`;
        }).join('')}
        ${[40,80,120,160,200,240,280,320,360,400,440,480,520,560,600,640,680,720,760].map(x=>`<ellipse cx="${x}" cy="8" rx="8" ry="3.5" fill="${lc}" opacity=".5" transform="rotate(15 ${x} 8)"/>`).join('')}
      `;
      return svg;
    }

    // Top garland
    const topGarland=makeGarland();bd2.appendChild(topGarland);
    bd2.appendChild(t);

    // Tasks in columns — responsive auto-fill grid, more columns on wider screens
    const allDueTasks=S.tasks.filter(t=>isActiveTask(t)&&wasPartOfToday(t));
    const list=el('div');
    list.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:2px 16px;margin:8px 0;width:100%;';

    // Sort by timeOfDay then name for consistent order
    const todOrder=['dawn','morning','afternoon','evening',''];
    const sorted=[...allDueTasks].sort((a,b)=>todOrder.indexOf(a.timeOfDay||'')-todOrder.indexOf(b.timeOfDay||''));

    sorted.forEach(task=>{
      const done=isDoneToday(task);
      const skipped=(task.skips||[]).includes(todayStr())||
        false; // carry-over feature removed
      const d=el('div');
      const color=cardColor(task);

      let statusIcon='';
      let textStyle='';
      if(done){
        statusIcon='✓ ';
        textStyle='text-decoration:line-through;opacity:0.5;';
      }else if(skipped){
        statusIcon='→ ';
        textStyle='opacity:0.6;font-style:italic;';
      }

      d.style.cssText=`font-size:12px;line-height:1.8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${textStyle}cursor:pointer;border-radius:3px;padding:0 2px;transition:background .12s;`;
      d.onmouseenter=()=>d.style.background='var(--parchment-dark)';
      d.onmouseleave=()=>d.style.background='';
      d.onclick=()=>{
        // Close notification and open card detail
        const notifEl=document.querySelector('.notif');
        if(notifEl)notifEl.style.display='none';
        showCardDetail(task,todayStr());
      };
      d.innerHTML=`<span style="color:${done?'#4a9e5c':skipped?'var(--brown-light)':color};font-weight:700;">${statusIcon}${fById(task.freq).label}</span> ${task.name}`;
      list.appendChild(d);
    });
    bd2.appendChild(list);

    // Bottom garland
    const bottomGarland=makeGarland();bd2.appendChild(bottomGarland);

    nb.style.cssText='position:relative;';
    const x=el('button','notif-close');x.textContent='×';
    x.onclick=()=>{S.notificationDismissed=true;render();};
    nb.append(bd2,x);app.appendChild(nb);
  }

  // Body
  const body=el('div','body');
  if(S.tab==='today') renderToday(body);
  else if(S.tab==='schedule') renderSchedule(body);
  else if(S.tab==='browse') renderBrowse(body);
  else if(S.tab==='pending') renderPending(body);
  else if(S.tab==='settings') renderSettings(body);
  else if(S.tab==='howto') renderHowTo(body);
  else if(S.tab==='walkthrough') renderWalkthrough(body);
  app.appendChild(body);

  // FAB — Today, Browse, Pending, and Schedule tabs
  if(S.tab==='today'||S.tab==='browse'||S.tab==='pending'||S.tab==='schedule'){
    const fab=el('button','fab');fab.textContent='+';fab.title='Add card';
    fab.onclick=()=>{S.showAdd=true;render();};app.appendChild(fab);
  }

  // Modals
  if(S.showAdd) app.appendChild(buildModal(S.newTask,false));
  if(S.editTask) app.appendChild(buildModal(S.editTask,true));
  if(S.showWelcome) app.appendChild(buildWelcomeScreen());

  // Side flowers (wide screens only — CSS handles hiding on mobile)
  buildSideFlowers();
}

// ══════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════
load();render();
</script>
</body>
