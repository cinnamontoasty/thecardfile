<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Card File"/>
<meta name="theme-color" content="#3a3128"/>
<title>The Card File</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap');

/* ── LIGHT MODE ── */
:root {
  --bg: #f5f0e8;
  --card-bg: #fffdf7;
  --border: #e0d4bc;
  --brown: #3a3128;
  --brown-mid: #5a4a38;
  --brown-light: #9a8870;
  --gold: #c8a96e;
  --parchment-dark: #e8dfc8;
  --text: #3a3128;
  --card-text: rgba(0,0,0,0.82);
  --card-sub: rgba(0,0,0,0.55);
  --card-border-color: rgba(0,0,0,0.10);
  --card-alpha1: cc;
  --card-alpha2: 99;
  --card-bar: rgba(0,0,0,0.18);
  --section-line: #e0d4bc;
  --safe-top: env(safe-area-inset-top,0px);
  --safe-bottom: env(safe-area-inset-bottom,0px);
}

/* ── DARK MODE ── */
body.dark {
  --bg: #1e1a16;
  --card-bg: #2a2218;
  --border: #3e3020;
  --brown: #f0e8e0;
  --brown-mid: #d4c4b0;
  --brown-light: #a09078;
  --gold: #c06878;
  --parchment-dark: #332818;
  --text: #f0e8e0;
  --card-text: rgba(255,242,228,0.90);
  --card-sub: rgba(255,242,228,0.60);
  --card-border-color: rgba(0,0,0,0.30);
  --card-bar: rgba(0,0,0,0.35);
  --section-line: #3e3020;
}
body.dark .header{background:#120f0a;}
body.dark .fab{background:var(--gold);color:#f0e8e0;}
body.dark .htitle{color:#d4c8bc;}
body.dark .eyebrow{color:#b09888;}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden;transition:background .3s,color .3s;}

/* ── HEADER ── */
.header{background:var(--brown);color:var(--bg);padding:calc(12px + var(--safe-top)) 16px 0;position:sticky;top:0;z-index:60;box-shadow:0 2px 12px rgba(0,0,0,0.25);}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.eyebrow{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:3px;}
.htitle{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;letter-spacing:-.01em;}
.hright{text-align:right;}
.hdate{font-size:10px;color:var(--brown-light);margin-bottom:2px;}
.hdue{font-size:11px;color:var(--gold);font-weight:500;cursor:pointer;text-decoration:underline dotted;}
.hdue:hover{opacity:.8;}

/* ── SIDE FLOWERS ── */
.side-flowers{
  position:fixed;bottom:0;width:56px;pointer-events:none;z-index:5;
}
.side-flowers-left{left:0;}
.side-flowers-right{right:0;}
@media(max-width:700px){.side-flowers{display:none;}}
@media(min-width:900px){.side-flowers{width:88px;}}
@media(min-width:1100px){.side-flowers{width:120px;}}
@media(min-width:1400px){.side-flowers{width:160px;}}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:9px 12px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--brown-light);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.tab.active{color:var(--bg);border-bottom-color:var(--gold);}
body.dark .tab.active{color:var(--gold);}

/* ── SETTINGS BUTTON ── */
.settings-tab{padding:8px 14px;background:transparent;border-radius:6px 6px 0 0;margin-left:4px;border:1px solid rgba(255,255,255,0.15);border-bottom:none;}
.settings-tab.active{background:rgba(255,255,255,0.12);color:var(--bg)!important;border-color:var(--gold)!important;}

/* ── BODY ── */
.body{padding:16px 13px calc(90px + var(--safe-bottom));max-width:700px;margin:0 auto;}

/* ── PROGRESS ── */
.progress-card{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:12px 15px;margin-bottom:14px;box-shadow:1px 2px 6px rgba(0,0,0,0.06);}
.progress-row{display:flex;justify-content:space-between;margin-bottom:7px;}
.progress-row span{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--brown-light);}
.pct{color:#4a9e5c!important;font-weight:700;}
.progress-bar{height:4px;background:var(--parchment-dark);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(to right,var(--gold),#4a9e5c);border-radius:2px;transition:width .5s ease;}

/* ── INDEX CARD ── */
.index-card{position:relative;border-radius:4px;margin-bottom:9px;box-shadow:2px 3px 10px rgba(0,0,0,0.13);transition:transform .15s;overflow:hidden;border:1px solid var(--card-border-color);}
.index-card:active{transform:scale(0.99);}
.index-card.done-today{opacity:.5;}
.index-card.is-mini{outline:3px solid #e8d800;outline-offset:-2px;}
.card-color-bar{position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--card-bar);}
.card-inner{background:transparent;padding:10px 13px 10px 20px;min-height:92px;display:flex;flex-direction:column;gap:4px;}
.card-inner.dark-text .card-freq{background:rgba(0,0,0,0.15);color:rgba(0,0,0,0.72);}
.card-inner.dark-text .card-mini-icon{color:rgba(0,0,0,0.55);}
.card-inner.dark-text .card-time{color:rgba(0,0,0,0.65);}
.card-inner.dark-text .card-special-label{color:rgba(0,0,0,0.65);}
.card-inner.dark-text .card-task{color:rgba(0,0,0,0.85);}
.card-inner.dark-text .card-area-sub{color:rgba(0,0,0,0.58);}
.card-inner.dark-text .card-supplies{color:rgba(0,0,0,0.55);border-top-color:rgba(0,0,0,0.15);}
.card-inner.dark-text .card-last{color:rgba(0,0,0,0.52);}
.card-inner.dark-text .icon-btn{color:rgba(0,0,0,0.45);}
.card-inner.dark-text .del-btn{color:rgba(160,40,40,0.55);}
.card-inner.dark-text .check-btn{border-color:rgba(0,0,0,0.3);background:rgba(0,0,0,0.08);}
.card-inner.dark-text .check-btn.done{background:rgba(0,0,0,0.7);border-color:rgba(0,0,0,0.7);color:#fff;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.card-freq{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:12px;background:rgba(255,255,255,0.55);color:rgba(0,0,0,0.72);}
body.dark .card-freq{background:rgba(0,0,0,0.25);color:rgba(255,240,220,0.85);}
.card-mini-icon{font-size:14px;color:rgba(0,0,0,0.55);visibility:hidden;}
body.dark .card-mini-icon{color:rgba(255,240,220,0.6);}
.is-mini .card-mini-icon{visibility:visible;}
.card-time{font-size:12px;font-weight:700;color:rgba(0,0,0,0.62);font-family:'Playfair Display',serif;font-style:italic;}
body.dark .card-time{color:rgba(255,240,220,0.7);}
.card-special-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.85);margin-bottom:1px;}
.card-task{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--card-text);line-height:1.3;flex:1;}
.card-task.done-text{text-decoration:line-through;opacity:.5;}
.card-area-sub{font-size:12px;font-weight:400;color:var(--card-sub);font-family:'Lato',sans-serif;display:block;margin-top:2px;}
.card-supplies{font-size:11px;color:var(--card-sub);font-style:italic;line-height:1.4;border-top:1px dashed rgba(0,0,0,0.18);padding-top:5px;margin-top:4px;}
body.dark .card-supplies{border-top-color:rgba(255,255,255,0.15);}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:5px;}
.card-last{font-size:11px;color:var(--card-sub);letter-spacing:.02em;}
.badge-due{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,0.7);color:#c0392b;padding:2px 7px;border-radius:10px;margin-left:5px;}
.badge-missed{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,0.7);color:#c0720a;padding:2px 7px;border-radius:10px;margin-left:5px;}
.badge-carryover{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,0.7);color:#5048a8;padding:2px 7px;border-radius:10px;margin-left:5px;}
.card-actions{display:flex;gap:4px;align-items:center;}
.icon-btn{background:none;border:none;cursor:pointer;padding:5px 6px;color:rgba(0,0,0,0.45);font-size:15px;line-height:1;-webkit-appearance:none;transition:color .15s;}
body.dark .icon-btn{color:rgba(255,240,220,0.5);}
.icon-btn:active{color:rgba(0,0,0,0.85);}
.del-btn{color:rgba(180,60,60,0.55);}
.check-btn{width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,0.6);background:rgba(255,255,255,0.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;-webkit-appearance:none;flex-shrink:0;}
.check-btn:not(.done):hover::after{content:'Mark complete';position:absolute;right:40px;background:rgba(0,0,0,0.75);color:#fff;font-size:10px;padding:3px 8px;border-radius:4px;white-space:nowrap;pointer-events:none;font-family:'Lato',sans-serif;}
.check-btn{position:relative;}
.check-btn:active{transform:scale(.88);}
.check-btn.done{background:rgba(255,255,255,0.85);border-color:rgba(255,255,255,0.9);color:#2d7a3a;}

/* ── SECTION HEADS ── */
.section-head{display:flex;align-items:center;gap:8px;margin:18px 0 10px;}
.sh-label{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;white-space:nowrap;padding:3px 10px;border-radius:12px;color:#fff;}
.sh-line{flex:1;height:1px;background:var(--section-line);}
.sh-count{font-size:10px;color:var(--brown-light);}

/* ── FILTER STRIPS ── */
.filter-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:12px;scrollbar-width:none;}
.filter-strip::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--card-bg);color:var(--brown-light);cursor:pointer;white-space:nowrap;-webkit-appearance:none;transition:all .15s;}
.filter-btn:active{opacity:.7;}

/* ── BROWSE TOGGLE ── */
.browse-toggle{display:flex;margin-bottom:13px;background:var(--parchment-dark);border-radius:20px;padding:3px;width:fit-content;}
.browse-btn{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:7px 18px;border-radius:17px;border:none;cursor:pointer;background:transparent;color:var(--brown-light);transition:all .2s;-webkit-appearance:none;}
.browse-btn.active{background:var(--brown);color:var(--bg);}
body.dark .browse-btn.active{background:var(--gold);color:#2a1f18;}

/* ── AREA HEADING ── */
.area-heading{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--brown-light);margin:18px 0 8px;font-weight:700;}

/* ── EMPTY ── */
.empty{text-align:center;padding:50px 20px;color:var(--brown-light);}
.empty-icon{font-size:36px;margin-bottom:12px;}
.empty-text{font-size:13px;letter-spacing:.05em;}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(22px + var(--safe-bottom));right:18px;width:52px;height:52px;border-radius:50%;background:var(--brown);color:var(--bg);border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.28);display:flex;align-items:center;justify-content:center;z-index:50;transition:transform .15s;-webkit-appearance:none;}
body.dark .fab{background:var(--gold);color:#2a1f18;}
.fab:active{transform:scale(.92);}

/* ── MODALS ── */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:flex-end;}
.modal{background:var(--card-bg);border-radius:16px 16px 0 0;padding:22px 18px calc(22px + var(--safe-bottom));width:100%;max-height:92vh;overflow-y:auto;animation:slideUp .28s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:3px;color:var(--text);}
.modal-sub{font-size:12px;color:var(--brown-light);margin-bottom:18px;}
.field{margin-bottom:14px;}
.field label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--brown-light);display:block;margin-bottom:5px;}
.field input,.field select,.field textarea{font-family:'Lato',sans-serif;font-size:15px;border:1px solid var(--border);border-radius:8px;padding:12px 13px;background:var(--bg);color:var(--text);outline:none;width:100%;-webkit-appearance:none;transition:border-color .15s;}
.field textarea{resize:vertical;min-height:60px;font-size:13px;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,169,110,.15);}
.checkbox-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;}
.checkbox-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--brown);flex-shrink:0;}
.checkbox-row span{font-size:14px;color:var(--text);}
.modal-btns{display:flex;gap:8px;margin-top:18px;}
.btn{flex:1;font-family:'Lato',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:14px;border-radius:8px;border:none;cursor:pointer;-webkit-appearance:none;transition:opacity .15s;}
.btn:active{opacity:.75;}
.btn-primary{background:var(--brown);color:var(--bg);}
body.dark .btn-primary{background:var(--gold);color:#2a1f18;}
.btn-ghost{background:var(--parchment-dark);color:var(--brown-light);}
.btn-danger{background:#c0392b;color:#fff;}

/* ── NOTIFICATIONS ── */
.notif{background:var(--card-bg);border-bottom:3px solid var(--gold);padding:10px 15px;position:sticky;top:0;z-index:55;}
.notif-body{flex:1;}
.notif-title{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;font-weight:700;}
.notif-list{font-size:12px;color:var(--brown-mid);line-height:1.9;}
.notif-close{position:absolute;top:8px;right:10px;background:none;border:none;font-size:20px;color:var(--brown-light);cursor:pointer;padding:0 4px;-webkit-appearance:none;}
.install-hint{background:var(--parchment-dark);border-bottom:1px solid var(--border);padding:11px 15px;display:flex;align-items:center;gap:10px;}
.install-hint-text{flex:1;font-size:12px;color:var(--brown-mid);line-height:1.5;}
.install-hint-close{background:none;border:none;font-size:18px;color:var(--brown-light);cursor:pointer;-webkit-appearance:none;}

/* ── SETTINGS ── */
.settings-section{margin-bottom:24px;}
.settings-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border);color:var(--text);}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px dashed var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-row-label{font-size:14px;color:var(--text);}
.settings-row-sub{font-size:11px;color:var(--brown-light);margin-top:2px;}
.settings-btn{font-family:'Lato',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:9px 16px;border-radius:6px;border:1px solid var(--border);background:var(--card-bg);color:var(--text);cursor:pointer;-webkit-appearance:none;}
.settings-btn:active{opacity:.7;}

/* ── LEGEND ── */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.legend-item{display:flex;align-items:center;gap:6px;}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.legend-label{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--brown-light);}

/* ── SCHEDULE VIEWS ── */
.schedule-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;}
.nav-arrow{background:none;border:none;font-size:20px;color:var(--brown-light);cursor:pointer;padding:4px 10px;-webkit-appearance:none;transition:color .15s;}
.nav-arrow:active{color:var(--text);}
.nav-label{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--text);}
.schedule-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.schedule-tab{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card-bg);color:var(--brown-light);cursor:pointer;-webkit-appearance:none;transition:all .15s;}
.schedule-tab.active{background:var(--brown);color:var(--bg);border-color:var(--brown);}
body.dark .schedule-tab.active{background:var(--gold);color:#2a1f18;border-color:var(--gold);}

/* ── MONTH GRID ── */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:16px;}
.month-day-header{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--brown-light);text-align:center;padding:4px 0;}
.month-cell{background:var(--card-bg);border:1px solid var(--border);border-radius:3px;min-height:52px;padding:4px;cursor:pointer;transition:background .15s;}
.month-cell:active{background:var(--parchment-dark);}
.month-cell.today{border-color:var(--gold);border-width:2px;}
.month-cell.other-month{opacity:.4;}
.month-cell-date{font-size:11px;font-weight:700;color:var(--text);margin-bottom:2px;}
.month-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin:1px;}
.month-count{font-size:9px;color:var(--brown-light);}

/* ── WEEK GRID ── */
.week-col-header{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--brown-light);text-align:center;padding:5px 2px;background:var(--card-bg);border-radius:4px;border:1px solid var(--border);min-width:0;}
.week-col-header.today{color:var(--gold);border-color:var(--gold);}
.week-col{display:flex;flex-direction:column;gap:3px;min-width:0;}
.week-mini-card{border-radius:3px;padding:4px 5px;font-size:9px;font-weight:700;cursor:pointer;line-height:1.3;min-width:0;overflow:hidden;}

/* ── YEAR VIEW ── */
.year-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.year-month{background:var(--card-bg);border:1px solid var(--border);border-radius:6px;padding:8px;}
.year-month-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text);margin-bottom:6px;text-align:center;}
.year-mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.year-cell{height:10px;border-radius:1px;background:var(--parchment-dark);cursor:pointer;transition:opacity .15s;}
.year-cell:active{opacity:.7;}
.year-cell.has-tasks{opacity:1;}
.year-cell.is-today{outline:1px solid var(--gold);}

/* ── COLOR PICKER ── */
.color-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.color-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .15s;}
.color-swatch.selected{border-color:var(--text);transform:scale(1.15);}
.color-swatch:active{transform:scale(.9);}

/* ── TOGGLE SWITCH ── */
.toggle-wrap{display:flex;align-items:center;gap:10px;}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:24px;cursor:pointer;transition:.3s;}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function todayStr(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;}
function dateStr(d){
  if(!(d instanceof Date))return d;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseDate(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function sameDay(a,b){return dateStr(a)===dateStr(b);}
function fById(id){return FREQS.find(f=>f.id===id)||FREQS[5];}
function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}

function cardColor(task){
  const sp=S.specialTypes.find(s=>s.id===task.special);
  if(sp) return sp.color;
  // Use theme colors if no custom override, otherwise use custom
  const themeColors=THEMES[S.theme]?.freqs||{};
  // Check if user has customized this color vs it being theme default
  const defaultForTheme=themeColors[task.freq];
  return S.freqColors[task.freq]||defaultForTheme||'#9a8870';
}

function applyTheme(themeId){
  const theme=THEMES[themeId];
  if(!theme)return;
  S.theme=themeId;
  S.freqColors={...theme.freqs};
  save();render();
}

function cardBg(task){
  const c=cardColor(task);
  const isSpecial=!!task.special&&S.specialTypes.some(s=>s.id===task.special);
  // Special cards always keep full vivid color in both modes
  if(isSpecial){
    return `linear-gradient(135deg,${c}cc 0%,${c}99 100%)`;
  }
  // Daily (D): same pale legal-pad yellow in BOTH light and dark mode
  // Fully opaque so dark background never bleeds through and causes green tint
  if(task.freq==='d'&&!isSpecial){
    return `linear-gradient(135deg,#FFFFC5 0%,#F0E868 100%)`;
  }
  const a1=S.darkMode?'88':'cc';
  const a2=S.darkMode?'66':'99';
  return `linear-gradient(135deg,${c}${a1} 0%,${c}${a2} 100%)`;
}

// Rolling due date calculation
function calcNextDueDate(task,fromDate){
  const f=fById(task.freq);
  const d=parseDate(fromDate)||new Date();
  if(f.days<1){
    return dateStr(addDays(d,1));
  }
  return dateStr(addDays(d,Math.ceil(f.days)));
}

function isActiveTask(task){
  if(!task.startDate) return false;
  return task.startDate<=todayStr();
}

function isPendingTask(task){
  return !task.startDate;
}

function isFutureTask(task){
  return task.startDate && task.startDate>todayStr();
}

function isDueOn(task,dateS){
  if(!isActiveTask(task)) return false;
  if(!task.nextDueDate) return false;
  // Check carry-overs
  if((task.carryOvers||[]).includes(dateS)) return true;
  // Due exactly on this date
  if(task.nextDueDate===dateS) return true;
  return false;
}

// Auto-advance overdue tasks to next occurrence (called on load)
function advanceOverdueTasks(){
  const today=todayStr();
  let changed=false;
  S.tasks.forEach(task=>{
    if(!isActiveTask(task)) return;
    if(!task.nextDueDate) return;
    // If overdue and not done today, roll forward to next occurrence
    if(task.nextDueDate<today&&!isDoneToday(task)){
      // Find next occurrence from today
      const f=fById(task.freq);
      let next=parseDate(task.nextDueDate);
      while(dateStr(next)<today){
        next=addDays(next,Math.ceil(f.days));
      }
      task.nextDueDate=dateStr(next);
      changed=true;
    }
  });
  if(changed) save();
}

function isDueToday(task){
  return isDueOn(task,todayStr());
}

function isDoneOn(task,dateS){
  return (task.completions||[]).some(c=>{
    // Handle both full ISO timestamps and date strings
    if(c.length>=10) return c.slice(0,10)===dateS;
    return c.startsWith(dateS);
  });
}

function isDoneToday(task){return isDoneOn(task,todayStr());}

function daysSince(task){
  const h=task.completions||[];
  if(!h.length) return null;
  return Math.floor((Date.now()-new Date(h[h.length-1]))/86400000);
}

// Get all active tasks due on a given date (for schedule views, including past days)
function tasksDueOn(dateS){
  const isPast=dateS<todayStr();
  return S.tasks.filter(t=>{
    if(!isActiveTask(t)) return false;
    // Task must have started on or before this date
    if(t.startDate>dateS) return false;
    // Carry-overs
    if((t.carryOvers||[]).includes(dateS)) return true;

    if(isPast){
      // For past dates: reconstruct whether this task was due on that day
      // by computing the cycle from startDate forward
      const f=fById(t.freq);
      const start=parseDate(t.startDate);
      const target=parseDate(dateS);
      const diff=(target-start)/86400000;
      if(diff<0) return false;
      if(diff===0) return true; // due on start date
      const cycles=Math.round(diff/f.days);
      const predicted=addDays(start,Math.round(cycles*f.days));
      return Math.abs((parseDate(dateStr(predicted))-target)/86400000)<0.6;
    }else{
      // Future/today: use nextDueDate logic
      if(t.nextDueDate===dateS) return true;
      if(t.nextDueDate && t.nextDueDate<=dateS){
        const f=fById(t.freq);
        const start=parseDate(t.nextDueDate);
        const target=parseDate(dateS);
        const diff=(target-start)/86400000;
        const cycles=Math.floor(diff/f.days);
        const predicted=addDays(start,cycles*Math.ceil(f.days));
        return dateStr(predicted)===dateS;
      }
    }
    return false;
  });
}

function load(){
  try{S.tasks=JSON.parse(localStorage.getItem('cf4_tasks'))||DEFAULT_TASKS;}catch{S.tasks=DEFAULT_TASKS;}
  try{const fc=localStorage.getItem('cf4_freqColors');if(fc)S.freqColors={...DEFAULT_FREQ_COLORS,...JSON.parse(fc)};}catch{}
  try{const sp=localStorage.getItem('cf4_special');if(sp)S.specialTypes=JSON.parse(sp);}catch{}
  try{const ar=localStorage.getItem('cf4_areas');if(ar)S.areas=JSON.parse(ar);}catch{}
  try{S.darkMode=localStorage.getItem('cf4_dark')==='1';}catch{}
  try{S.darkAccent=localStorage.getItem('cf4_darkAccent')||'#c06878';}catch{}
  try{S.theme=localStorage.getItem('cf4_theme')||'parchment';}catch{}
  try{S.nextId=parseInt(localStorage.getItem('cf4_nid'))||200;}catch{}
  if(S.darkMode){
    document.body.classList.add('dark');
  }
  // Apply accent color globally
  document.body.style.setProperty('--gold',S.darkAccent);
  const ln=localStorage.getItem('cf4_lastNotif');
  if(ln!==todayStr()){
    const due=S.tasks.filter(t=>isDueToday(t));
    if(due.length){S._notification=due;localStorage.setItem('cf4_lastNotif',todayStr());}
  }
  S.showInstall=window.navigator.standalone!==true&&!localStorage.getItem('cf4_installOk');
  S.showWelcome=!localStorage.getItem('cf4_welcomeSeen');
  S.firstTime=!localStorage.getItem('cf4_firstTimeDone');
  S.firstTimeHowTo=false;
  // Roll overdue tasks to next occurrence
  advanceOverdueTasks();
}

function save(){
  localStorage.setItem('cf4_tasks',JSON.stringify(S.tasks));
  localStorage.setItem('cf4_freqColors',JSON.stringify(S.freqColors));
  localStorage.setItem('cf4_special',JSON.stringify(S.specialTypes));
  localStorage.setItem('cf4_areas',JSON.stringify(S.areas));
  localStorage.setItem('cf4_dark',S.darkMode?'1':'0');
  localStorage.setItem('cf4_darkAccent',S.darkAccent);
  localStorage.setItem('cf4_theme',S.theme);
  localStorage.setItem('cf4_nid',String(S.nextId));
}

// ══════════════════════════════════════════
// EXPORT / IMPORT
// ══════════════════════════════════════════
function exportData(){
  const data={tasks:S.tasks,freqColors:S.freqColors,specialTypes:S.specialTypes,areas:S.areas,nextId:S.nextId,exported:new Date().toISOString(),version:4};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='cardfile-backup-'+todayStr()+'.json';a.click();URL.revokeObjectURL(url);
}

function importData(){
  const input=document.createElement('input');input.type='file';input.accept='.json,application/json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.tasks){
          S.tasks=data.tasks;S.nextId=data.nextId||200;
          if(data.freqColors)S.freqColors={...DEFAULT_FREQ_COLORS,...data.freqColors};
          if(data.specialTypes)S.specialTypes=data.specialTypes;
          if(data.areas)S.areas=data.areas;
          save();alert('✓ Card file restored successfully!');render();
        }else{alert('Invalid backup file.');}
      }catch{alert('Could not read backup file.');}
    };
    reader.readAsText(file);
  };
  input.click();
}

// Undo state
let S_undo=null;
let S_undoTimer=null;

function markDone(id,onDateStr){
  const task=S.tasks.find(t=>t.id===id);if(!task)return;
  const dStr=onDateStr||todayStr();
  // Save undo snapshot
  S_undo={
    taskId:id,
    completions:[...(task.completions||[])],
    carryOvers:[...(task.carryOvers||[])],
    nextDueDate:task.nextDueDate,
    label:task.name,
  };
  // Record completion
  const ts=dStr+'T12:00:00.000Z';
  task.completions=[...(task.completions||[]),ts];
  task.carryOvers=(task.carryOvers||[]).filter(d=>d!==dStr);
  task.nextDueDate=calcNextDueDate(task,dStr);
  save();render();
  showUndoToast(`"${task.name}" marked complete`);
}

function undoLastCompletion(){
  if(!S_undo)return;
  const task=S.tasks.find(t=>t.id===S_undo.taskId);
  if(task){
    task.completions=S_undo.completions;
    task.carryOvers=S_undo.carryOvers;
    task.nextDueDate=S_undo.nextDueDate;
    save();
  }
  S_undo=null;
  dismissUndoToast();
  render();
}

function showUndoToast(msg){
  dismissUndoToast();
  const toast=el('div','undo-toast');
  toast.id='undo-toast';
  const txt=el('div','undo-toast-text');txt.textContent='✓ '+msg;
  const btn=el('button','undo-toast-btn');btn.textContent='Undo';
  btn.onclick=()=>undoLastCompletion();
  const bar=el('div','undo-toast-bar');
  toast.append(txt,btn,bar);
  document.body.appendChild(toast);
  if(S_undoTimer)clearTimeout(S_undoTimer);
  S_undoTimer=setTimeout(()=>{S_undo=null;dismissUndoToast();},5000);
}

function dismissUndoToast(){
  const t=document.getElementById('undo-toast');
  if(t)t.remove();
  if(S_undoTimer){clearTimeout(S_undoTimer);S_undoTimer=null;}
}

function showCompletionPopup(task,dateContext){
  const bd=el('div','backdrop');
  bd.onclick=e=>{if(e.target===bd)bd.remove();};
  const modal=el('div','modal');
  modal.style.cssText='background:var(--card-bg);border-radius:16px 16px 0 0;padding:22px 18px 32px;width:100%;max-height:70vh;overflow-y:auto;animation:slideUp .28s ease;';
  const title=el('div','modal-title');title.textContent='Mark as Complete';
  const sub=el('div','modal-sub');sub.textContent=task.name;
  modal.append(title,sub);

  const isPastDate=dateContext&&dateContext<todayStr();
  const yesterday=dateStr(addDays(new Date(),-1));
  const yestLabel=parseDate(yesterday).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const todayLabel=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  let opts;
  if(isPastDate){
    // For past days — mark for that specific date or skip
    const pastLabel=parseDate(dateContext).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    opts=[
      {label:`✓ Completed on this day`,sub:pastLabel,fn:()=>{bd.remove();markDone(task.id,dateContext);}},
      {label:`↷ Skip this day`,sub:'Advance schedule without marking complete',fn:()=>{
        bd.remove();
        const t=S.tasks.find(t=>t.id===task.id);if(!t)return;
        t.nextDueDate=calcNextDueDate(t,dateContext);
        save();render();
      }},
    ];
  }else{
    opts=[
      {label:`✓ Completed today`,sub:todayLabel,fn:()=>{bd.remove();markDone(task.id,todayStr());}},
      {label:`✓ Completed yesterday`,sub:yestLabel,fn:()=>{bd.remove();markDone(task.id,yesterday);}},
      {label:`↷ Skip this time`,sub:'Advance to next due date without marking complete',fn:()=>{
        bd.remove();
        const t=S.tasks.find(t=>t.id===task.id);if(!t)return;
        t.nextDueDate=calcNextDueDate(t,todayStr());
        save();render();
      }},
    ];
  }

  opts.forEach(opt=>{
    const row=el('div');
    row.style.cssText='padding:14px 0;border-bottom:1px dashed var(--border);cursor:pointer;transition:background .15s;border-radius:4px;';
    row.onmouseenter=()=>row.style.background='var(--parchment-dark)';
    row.onmouseleave=()=>row.style.background='';
    const lbl=el('div');lbl.style.cssText='font-size:15px;font-weight:600;color:var(--text);margin-bottom:2px;';lbl.textContent=opt.label;
    const sub2=el('div');sub2.style.cssText='font-size:11px;color:var(--brown-light);';sub2.textContent=opt.sub;
    row.append(lbl,sub2);row.onclick=opt.fn;modal.appendChild(row);
  });

  const cancel=el('button','btn btn-ghost');cancel.style.marginTop='16px';cancel.textContent='Cancel';cancel.onclick=()=>bd.remove();
  modal.appendChild(cancel);
  bd.appendChild(modal);document.body.appendChild(bd);
}

function carryOver(id){
  const task=S.tasks.find(t=>t.id===id);if(!task)return;
  const tomorrow=dateStr(addDays(new Date(),1));
  task.carryOvers=[...(task.carryOvers||[]).filter(d=>d!==todayStr()),tomorrow];
  // Advance nextDueDate past tomorrow so it doesn't double-show
  if(task.nextDueDate===todayStr()) task.nextDueDate=tomorrow;
  save();render();
}

function addTask(){
  if(!S.newTask.name.trim())return;
  const t={...S.newTask,id:S.nextId++,name:S.newTask.name.trim(),supplies:S.newTask.supplies.trim(),completions:[],carryOvers:[]};
  // If startDate set, calculate first nextDueDate = startDate; else leave blank (pending)
  if(t.startDate){t.nextDueDate=t.startDate;}
  else{t.nextDueDate='';}
  S.tasks.push(t);
  S.newTask={name:'',area:S.areas[0]||'General',freq:'w',time:'',supplies:'',mini:false,special:'',startDate:'',timeOfDay:'',timeOfDay2:''};
  S.showAdd=false;save();render();
}

function deleteTask(id){
  const task=S.tasks.find(t=>t.id===id);
  const name=task?task.name:'this card';
  if(!confirm(`Delete "${name}"?\n\nThis will permanently remove the card and all its history. It will NOT just remove it from the current view.\n\nThis cannot be undone.`))return;
  S.tasks=S.tasks.filter(t=>t.id!==id);save();render();
}

function saveEdit(){
  const idx=S.tasks.findIndex(t=>t.id===S.editTask.id);
  if(idx>=0){
    S.tasks[idx]={...S.editTask};
    if(S.tasks[idx].startDate&&!S.tasks[idx].nextDueDate){
      S.tasks[idx].nextDueDate=S.tasks[idx].startDate;
    }
  }
  S.editTask=null;save();render();
}

function toggleDark(){
  S.darkMode=!S.darkMode;
  document.body.classList.toggle('dark',S.darkMode);
  document.body.style.setProperty('--gold',S.darkAccent);
  save();render();
}

// ══════════════════════════════════════════
function buildSideFlowers(){
  const isLight=!S.darkMode;
  const acc=S.darkAccent||'#c06878';
  const r=parseInt(acc.slice(1,3),16),g=parseInt(acc.slice(3,5),16),b=parseInt(acc.slice(5,7),16);
  const lighter=`rgb(${Math.min(255,r+55)},${Math.min(255,g+55)},${Math.min(255,b+55)})`;
  const darker=`rgb(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)})`;
  const C={
    rose:    isLight?'#f0b0c0':lighter,
    roseD:   isLight?'#d4788a':acc,
    daisy:   isLight?'#b8a0d4':lighter,
    dCtr:    isLight?'#e8d840':lighter,
    sfP:     isLight?'#f5c842':lighter,
    sfC:     isLight?'#8B6914':darker,
    pOut:    isLight?'#7060c0':acc,
    pIn:     isLight?'#5048a8':darker,
    pLt:     isLight?'#8878d0':lighter,
    pCtr:    isLight?'#f5e87a':lighter,
    leaf:    isLight?'#7a9a6a':'#907878',
    leafD:   isLight?'#5a7a4a':'#785858',
    vine:    isLight?'#5a7a4a':'#907878',
  };

  // Build flower pattern for a given column width W
  // All coordinates are in a 100-unit wide space, scaled to actual W
  function makeFlowers(W,side){
    const cx=side==='left'?W*0.75:W*0.25;
    const dir=side==='left'?1:-1;
    const s=W/100; // scale factor — flowers grow with column width
    function rb(x,y,rad=7){
      const rx=cx+(x-50)*s,ry=y;
      return `<circle cx="${rx}" cy="${ry}" r="${rad*s}" fill="${C.rose}" opacity=".85"/><circle cx="${rx}" cy="${ry}" r="${rad*s*.55}" fill="${C.roseD}" opacity=".9"/>`;
    }
    function daisy(x,y,rad=10){
      const rx=cx+(x-50)*s,ry=y;
      return Array.from({length:10},(_,i)=>{const a=i*36*Math.PI/180;return `<ellipse cx="${rx+Math.cos(a)*rad*s}" cy="${ry+Math.sin(a)*rad*s}" rx="${4.5*s}" ry="${2.2*s}" fill="${C.daisy}" opacity=".85" transform="rotate(${i*36} ${rx+Math.cos(a)*rad*s} ${ry+Math.sin(a)*rad*s})"/>`;}).join('')+`<circle cx="${rx}" cy="${ry}" r="${4.5*s}" fill="${C.dCtr}"/>`;
    }
    function sf(x,y,rad=10){
      const rx=cx+(x-50)*s,ry=y;
      return Array.from({length:12},(_,i)=>{const a=i*30*Math.PI/180;return `<ellipse cx="${rx+Math.cos(a)*rad*s}" cy="${ry+Math.sin(a)*rad*s}" rx="${4.5*s}" ry="${2.2*s}" fill="${C.sfP}" opacity=".9" transform="rotate(${i*30} ${rx+Math.cos(a)*rad*s} ${ry+Math.sin(a)*rad*s})"/>`;}).join('')+`<circle cx="${rx}" cy="${ry}" r="${5.5*s}" fill="${C.sfC}"/>`;
    }
    function pansy(x,y,ps=1){
      const rx=cx+(x-50)*s,ry=y,ss=ps*s;
      return `<ellipse cx="${rx-7*ss}" cy="${ry-5*ss}" rx="${8*ss}" ry="${5*ss}" fill="${C.pOut}" opacity=".82"/><ellipse cx="${rx+7*ss}" cy="${ry-5*ss}" rx="${8*ss}" ry="${5*ss}" fill="${C.pOut}" opacity=".82"/><ellipse cx="${rx}" cy="${ry+6*ss}" rx="${8*ss}" ry="${5*ss}" fill="${C.pIn}" opacity=".88"/><ellipse cx="${rx-6*ss}" cy="${ry+2*ss}" rx="${6*ss}" ry="${4*ss}" fill="${C.pLt}" opacity=".72"/><ellipse cx="${rx+6*ss}" cy="${ry+2*ss}" rx="${6*ss}" ry="${4*ss}" fill="${C.pLt}" opacity=".72"/><circle cx="${rx}" cy="${ry+1.5*ss}" r="${2.5*ss}" fill="${C.pCtr}"/>`;
    }
    function leaf(x,y,lx,ly,rot){
      const rx=cx+(x-50)*s,ry=y;
      return `<ellipse cx="${rx}" cy="${ry}" rx="${lx*s}" ry="${ly*s}" fill="${C.leaf}" opacity=".75" transform="rotate(${rot} ${rx} ${ry})"/>`;
    }
    function leafD(x,y,lx,ly,rot){
      const rx=cx+(x-50)*s,ry=y;
      return `<ellipse cx="${rx}" cy="${ry}" rx="${lx*s}" ry="${ly*s}" fill="${C.leafD}" opacity=".65" transform="rotate(${rot} ${rx} ${ry})"/>`;
    }
    const vcx=cx;
    return `
      <path d="M${vcx} 0 Q${vcx+dir*15*s} 300 ${vcx} 600 Q${vcx+dir*15*s} 900 ${vcx} 1200 Q${vcx+dir*15*s} 1500 ${vcx} 1800 Q${vcx+dir*15*s} 2100 ${vcx} 2400" stroke="${C.vine}" stroke-width="${1.5*s}" fill="none" opacity=".5"/>
      ${leaf(50,50,15,6,-35)}${leafD(50,72,11,5,18)}
      ${rb(50,100,7)}
      ${leaf(50,138,14,6,-28)}${leafD(50,158,10,5,14)}
      ${daisy(50,195,10)}
      ${leaf(50,238,15,6,-40)}${leafD(50,258,11,5,22)}
      ${rb(50,284,6)}${rb(50,304,5)}
      ${leaf(50,330,14,6,-32)}
      ${sf(50,368,10)}
      ${leaf(50,408,15,6,-38)}${leafD(50,428,11,5,18)}
      ${rb(50,454,7)}
      ${leaf(50,490,14,6,-28)}
      ${pansy(50,530,1)}
      ${leaf(50,570,15,6,-42)}${leafD(50,590,10,5,22)}
      ${rb(50,615,6)}
      ${leaf(50,645,14,6,-32)}${leafD(50,665,11,5,16)}
      ${daisy(50,694,10)}
      ${leaf(50,734,15,6,-38)}
      ${rb(50,767,7)}${rb(50,787,5)}
      ${leaf(50,812,14,6,-28)}${leafD(50,830,10,5,18)}
      ${sf(50,860,10)}
      ${leaf(50,900,15,6,-42)}
      ${pansy(50,940,1)}
      ${leaf(50,978,14,6,-32)}${leafD(50,998,11,5,16)}
      ${rb(50,1025,7)}
      ${leaf(50,1058,15,6,-38)}${leafD(50,1076,10,5,22)}
      ${daisy(50,1106,10)}
      ${leaf(50,1146,14,6,-28)}
      ${rb(50,1176,6)}${rb(50,1196,5)}
      ${leaf(50,1222,15,6,-35)}${leafD(50,1242,11,5,18)}
      ${rb(50,1270,7)}
      ${leaf(50,1306,14,6,-28)}${leafD(50,1326,10,5,14)}
      ${daisy(50,1363,10)}
      ${sf(50,1440,10)}
      ${pansy(50,1530,1)}
      ${daisy(50,1620,10)}
      ${rb(50,1700,7)}
      ${sf(50,1780,10)}
      ${pansy(50,1860,1)}
      ${daisy(50,1940,10)}
      ${rb(50,2020,6)}${rb(50,2040,5)}
      ${sf(50,2120,10)}
      ${pansy(50,2210,1)}
      ${daisy(50,2300,10)}
      ${rb(50,2380,7)}
    `;
  }

  ['left','right'].forEach(side=>{
    const div=el('div',`side-flowers side-flowers-${side}`);
    div.style.cssText=`position:fixed;bottom:0;pointer-events:none;z-index:5;`;
    if(side==='left') div.style.left='0';
    else div.style.right='0';

    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.style.cssText='display:block;width:100%;';
    div.appendChild(svg);
    document.body.appendChild(div);

    function redraw(){
      const W=div.offsetWidth||56;
      const H=Math.max(document.body.scrollHeight,window.innerHeight)*1.2;
      svg.setAttribute('width',W);
      svg.setAttribute('height',H);
      svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
      svg.style.height=H+'px';
      svg.innerHTML=makeFlowers(W,side);
    }

    // Set top based on header + notification height
    requestAnimationFrame(()=>{
      const hdr=document.querySelector('.header');
      const notif=document.querySelector('.notif');
      const top=(hdr?hdr.offsetHeight:90)+(notif?notif.offsetHeight:0)+2;
      div.style.top=top+'px';
      redraw();
    });

    if(window.ResizeObserver){
      const ro=new ResizeObserver(()=>{
        const hdr=document.querySelector('.header');
        const notif=document.querySelector('.notif');
        const top=(hdr?hdr.offsetHeight:90)+(notif?notif.offsetHeight:0)+2;
        div.style.top=top+'px';
        redraw();
      });
      ro.observe(document.body);
    }
  });
}

function scheduleNavFlowers(label){
  const isLight=!S.darkMode;
  const acc=S.darkAccent||'#c06878';
  const rr=parseInt(acc.slice(1,3),16),gg=parseInt(acc.slice(3,5),16),bb=parseInt(acc.slice(5,7),16);
  const lighter=`rgb(${Math.min(255,rr+50)},${Math.min(255,gg+50)},${Math.min(255,bb+50)})`;
  const rc=isLight?'#f0b0c0':lighter;
  const rd=isLight?'#d4788a':acc;
  const dp=isLight?'#b8a0d4':lighter;
  const dc=isLight?'#e8d840':lighter;
  const lc=isLight?'#7a9a6a':'#a07880';

  function rb(x,y,r=5){return `<circle cx="${x}" cy="${y}" r="${r}" fill="${rc}" opacity=".85"/><circle cx="${x}" cy="${y}" r="${r*.55}" fill="${rd}" opacity=".9"/>`;}
  function sm(x,y,r=7){return Array.from({length:10},(_,i)=>{const a=i*36*Math.PI/180;return `<ellipse cx="${x+Math.cos(a)*r}" cy="${y+Math.sin(a)*r}" rx="3" ry="1.5" fill="${dp}" opacity=".85" transform="rotate(${i*36} ${x+Math.cos(a)*r} ${y+Math.sin(a)*r})"/>`;}).join('')+`<circle cx="${x}" cy="${y}" r="3" fill="${dc}"/>`;}
  function lf(x,y,rx,ry,rot){return `<ellipse cx="${x}" cy="${y}" rx="${rx}" ry="${ry}" fill="${lc}" opacity=".7" transform="rotate(${rot} ${x} ${y})"/>`;}

  // Use a div-based approach so text isn't truncated
  const wrap=el('div');
  wrap.style.cssText='flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-width:0;';

  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width','60');svg.setAttribute('height','36');
  svg.style.cssText='flex-shrink:0;';
  svg.innerHTML=`
    ${lf(52,18,11,5,35)}${lf(40,10,9,4,-15)}
    ${rb(28,18,5)}${sm(14,18,6)}${rb(4,18,4)}
  `;

  const svg2=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg2.setAttribute('width','60');svg2.setAttribute('height','36');
  svg2.style.cssText='flex-shrink:0;';
  svg2.innerHTML=`
    ${lf(8,18,11,5,-35)}${lf(20,10,9,4,15)}
    ${rb(32,18,5)}${sm(46,18,6)}${rb(56,18,4)}
  `;

  const lbl=el('div');
  lbl.style.cssText='font-family:"Playfair Display",serif;font-size:14px;font-weight:600;color:var(--text);text-align:center;line-height:1.2;padding:0 4px;flex:1;min-width:0;word-break:break-word;';
  lbl.textContent=label;

  wrap.append(svg,lbl,svg2);
  return wrap;
}

// ══════════════════════════════════════════
// CARD COMPONENT
// ══════════════════════════════════════════
function renderCard(task,showArea,opts={}){
  const dateCtx=opts.dateContext||todayStr();
  const isPastDate=dateCtx<todayStr();
  // For 2/D dual slot, use slot-specific done state; otherwise use date-based
  const doneOnDate=opts.slotDone!==undefined?opts.slotDone:isDoneOn(task,dateCtx);
  const doneToday=isDoneToday(task);
  const dueToday=isDueToday(task);
  const ds=daysSince(task);
  const freq=fById(task.freq);

  const card=el('div','index-card'+(task.mini?' is-mini':'')+(doneOnDate?' done-today':''));
  card.style.background=cardBg(task);

  const bar=el('div','card-color-bar');card.appendChild(bar);

  // Determine if this card's color is light enough to need dark text
  const hexC=cardColor(task);
  const rr=parseInt(hexC.slice(1,3),16),gg=parseInt(hexC.slice(3,5),16),bb=parseInt(hexC.slice(5,7),16);
  const lum=(rr*0.299+gg*0.587+bb*0.114)/255;
  const needsDarkText=lum>0.62;

  const inner=el('div','card-inner'+(needsDarkText?' dark-text':''));

  // Header
  const header=el('div','card-header');
  const fb=el('span','card-freq');fb.textContent=freq.label;
  const mi=el('span','card-mini-icon');mi.textContent='✦';
  // Time of day badge if set
  if(task.timeOfDay){
    const tod=TIME_OF_DAY.find(t=>t.id===task.timeOfDay);
    if(tod){const tb=el('span');tb.style.cssText='font-size:9px;opacity:.7;margin-left:4px;';tb.textContent=tod.label.split(' ')[0];fb.after(tb);}
  }
  const ti=el('span','card-time');ti.textContent=task.time||'';
  header.append(fb,mi,ti);inner.appendChild(header);

  // Special label
  if(task.special){
    const sp=S.specialTypes.find(s=>s.id===task.special);
    if(sp){const sl=el('div','card-special-label');sl.textContent=sp.label;inner.appendChild(sl);}
  }

  // Task name
  const tn=el('div','card-task'+(doneOnDate?' done-text':''));
  tn.textContent=task.name;
  if(showArea&&task.area){const as=el('span','card-area-sub');as.textContent=task.area;tn.appendChild(as);}
  inner.appendChild(tn);

  // Supplies
  if(task.supplies){const sup=el('div','card-supplies');sup.textContent=task.supplies;inner.appendChild(sup);}

  // Footer
  const footer=el('div','card-footer');
  const lfoot=el('div');lfoot.style.cssText='display:flex;align-items:center;flex-wrap:wrap;gap:3px;';
  const lastEl=el('span','card-last');
  if(isPastDate){
    lastEl.textContent=doneOnDate?'✓ Completed':'Not completed';
    if(doneOnDate) lastEl.style.color='#4a9e5c';
  }else{
    lastEl.textContent=ds===null?'Never done':ds===0?'Done today':`${ds}d ago`;
  }
  lfoot.appendChild(lastEl);
  if(!isPastDate&&dueToday&&!doneToday){
    const missed=(task.carryOvers||[]).includes(todayStr());
    if(missed){const b=el('span','badge-carryover');b.textContent='Carried over';lfoot.appendChild(b);}
    else{const b=el('span','badge-due');b.textContent='Due';lfoot.appendChild(b);}
  }

  const actions=el('div','card-actions');
  // Carry-over button (only on today tab for due tasks)
  if(opts.showCarryOver&&dueToday&&!doneToday){
    const co=el('button','icon-btn');co.textContent='→';co.title='Carry over to tomorrow';
    co.onclick=()=>carryOver(task.id);actions.appendChild(co);
  }
  const editBtn=el('button','icon-btn');editBtn.textContent='✎';editBtn.title='Edit this card';
  editBtn.onclick=()=>{S.editTask={...task,completions:[...(task.completions||[])],carryOvers:[...(task.carryOvers||[])]};render();};
  const delBtn=el('button','icon-btn del-btn');delBtn.textContent='✕';delBtn.title='Delete this card';
  delBtn.onclick=()=>deleteTask(task.id);
  const chk=el('button','check-btn'+(doneOnDate?' done':''));
  chk.textContent=doneOnDate?'✓':'';
  chk.title=doneOnDate?'Completed':'Mark complete';
  chk.onclick=()=>{
    if(doneOnDate)return;
    if(opts.on2dMark){
      // 2/D dual slot — use direct mark without popup
      opts.on2dMark();
    }else{
      showCompletionPopup(task,isPastDate?dateCtx:null);
    }
  };
  actions.append(editBtn,delBtn,chk);
  footer.append(lfoot,actions);inner.appendChild(footer);
  card.appendChild(inner);
  return card;
}

function sectionHead(label,color,count){
  const sh=el('div','section-head');
  const lb=el('span','sh-label');lb.textContent=label;
  // Ensure label is readable — use dark text if color is very light
  const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
  const lum=(r*0.299+g*0.587+b*0.114)/255;
  lb.style.background=color;
  lb.style.color=lum>0.65?'rgba(0,0,0,0.75)':'#fff';
  const ln=el('div','sh-line');
  const ct=el('span','sh-count');ct.textContent=count!=null?`(${count})`:'';
  sh.append(lb,ln,ct);return sh;
}

function showTodayProgressPopup(dueTasks,doneCount,total){
  const bd=el('div','backdrop');
  bd.onclick=e=>{if(e.target===bd)bd.remove();};
  const modal=el('div','modal');
  const title=el('div','modal-title');title.textContent='Today at a Glance';
  const sub=el('div','modal-sub');sub.textContent=`${doneCount} of ${total} active tasks done today`;
  modal.append(title,sub);

  const doneTasks=S.tasks.filter(t=>isActiveTask(t)&&isDoneToday(t));
  const outstanding=dueTasks.filter(t=>!isDoneToday(t));

  function makeGarland(){
    const isLight=!S.darkMode;
    const acc=S.darkAccent||'#c06878';
    const ra=parseInt(acc.slice(1,3),16),ga=parseInt(acc.slice(3,5),16),ba=parseInt(acc.slice(5,7),16);
    const lighter=`rgb(${Math.min(255,ra+55)},${Math.min(255,ga+55)},${Math.min(255,ba+55)})`;
    const rc=isLight?'#f0b0c0':lighter,rd=isLight?'#d4788a':acc;
    const dp=isLight?'#b8a0d4':lighter,dc=isLight?'#e8d840':lighter;
    const lc=isLight?'#7a9a6a':'#907878';
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 400 16');svg.setAttribute('preserveAspectRatio','xMidYMid meet');
    svg.style.cssText='width:100%;height:14px;display:block;margin:8px 0;';
    svg.innerHTML=`<path d="M0 8 Q200 2 400 8" stroke="${lc}" stroke-width="1" fill="none" opacity=".5"/>
      ${[20,60,100,140,180,220,260,300,340,380].map((x,i)=>{
        if(i%3===0)return `<circle cx="${x}" cy="8" r="4" fill="${rc}" opacity=".85"/><circle cx="${x}" cy="8" r="2.2" fill="${rd}" opacity=".9"/>`;
        if(i%3===1)return Array.from({length:8},(_,j)=>{const a=j*45*Math.PI/180;return `<ellipse cx="${x+Math.cos(a)*5}" cy="${8+Math.sin(a)*5}" rx="2.5" ry="1.2" fill="${dp}" opacity=".8" transform="rotate(${j*45} ${x+Math.cos(a)*5} ${8+Math.sin(a)*5})"/>`;}).join('')+`<circle cx="${x}" cy="8" r="2.5" fill="${dc}"/>`;
        return Array.from({length:8},(_,j)=>{const a=j*45*Math.PI/180;return `<ellipse cx="${x+Math.cos(a)*4}" cy="${8+Math.sin(a)*4}" rx="2" ry="1" fill="${isLight?'#f5c842':lighter}" opacity=".85" transform="rotate(${j*45} ${x+Math.cos(a)*4} ${8+Math.sin(a)*4})"/>`;}).join('')+`<circle cx="${x}" cy="8" r="2" fill="#8B6914"/>`;
      }).join('')}
      ${[40,80,120,160,200,240,280,320,360].map(x=>`<ellipse cx="${x}" cy="8" rx="8" ry="3.5" fill="${lc}" opacity=".5" transform="rotate(15 ${x} 8)"/>`).join('')}`;
    return svg;
  }

  if(doneTasks.length){
    const dh=el('div');dh.style.cssText='font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#4a9e5c;margin:12px 0 6px;';dh.textContent='✓ Completed today';
    modal.appendChild(dh);modal.appendChild(makeGarland());
    const dg=el('div');dg.style.cssText='display:grid;grid-template-columns:repeat(2,1fr);gap:2px 12px;';
    doneTasks.forEach(t=>{
      const d=el('div');d.style.cssText='font-size:12px;line-height:1.8;color:var(--brown-light);text-decoration:line-through;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
      d.textContent=t.name;dg.appendChild(d);
    });
    modal.appendChild(dg);modal.appendChild(makeGarland());
  }

  if(outstanding.length){
    const oh=el('div');oh.style.cssText='font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin:12px 0 6px;';oh.textContent='◌ Still outstanding';
    modal.appendChild(oh);modal.appendChild(makeGarland());
    const og=el('div');og.style.cssText='display:grid;grid-template-columns:repeat(2,1fr);gap:2px 12px;';
    outstanding.forEach(t=>{
      const d=el('div');d.style.cssText='font-size:12px;line-height:1.8;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
      const color=cardColor(t);
      d.innerHTML=`<span style="color:${color};font-weight:700;">${fById(t.freq).label}</span> ${t.name}`;
      og.appendChild(d);
    });
    modal.appendChild(og);modal.appendChild(makeGarland());
  }

  const cancel=el('button','btn btn-ghost');cancel.style.marginTop='12px';cancel.textContent='Close';cancel.onclick=()=>bd.remove();
  modal.appendChild(cancel);bd.appendChild(modal);document.body.appendChild(bd);
}

function renderToday(body){
  backupWarningBanner(body);
  const dueTasks=S.tasks.filter(t=>isActiveTask(t)&&isDueToday(t));
  const total=S.tasks.filter(t=>isActiveTask(t)).length;
  const doneCount=S.tasks.filter(t=>isActiveTask(t)&&isDoneToday(t)).length;

  if(total>0){
    const pc=el('div','progress-card');
    pc.style.cursor='pointer';pc.title='Click to see today\'s summary';
    pc.onclick=()=>showTodayProgressPopup(dueTasks,doneCount,total);
    const pr=el('div','progress-row');
    const l=el('span');l.textContent='Completed today';
    const rightSide=el('div');rightSide.style.cssText='display:flex;align-items:center;gap:6px;';
    const hint=el('span');hint.style.cssText='font-size:9px;color:var(--brown-light);';hint.textContent='tap for summary';
    const r=el('span','pct');r.textContent=`${doneCount} / ${total}`;
    rightSide.append(hint,r);pr.append(l,rightSide);
    const pb=el('div','progress-bar');
    const pf=el('div','progress-fill');pf.style.width=`${Math.round(doneCount/total*100)}%`;
    pb.appendChild(pf);pc.append(pr,pb);body.appendChild(pc);
  }

  if(!dueTasks.length){
    const emp=el('div','empty');
    const ic=el('div','empty-icon');ic.textContent='✓';
    const tx=el('div','empty-text');tx.textContent='All caught up! Nothing due today.';
    emp.append(ic,tx);body.appendChild(emp);return;
  }

  // Build the list of task+slot combinations to show
  // For 2/D tasks with two slots, show once in each slot
  // Track per-slot completion using todayStr+slot key
  const todayCompletions=S.tasks.reduce((acc,t)=>{
    const count=(t.completions||[]).filter(c=>c.startsWith(todayStr())).length;
    acc[t.id]=count;return acc;
  },{});

  // Build slot entries — each entry is {task, slotId, slotIndex (0=first, 1=second)}
  const slotEntries=[];
  dueTasks.forEach(task=>{
    if(task.freq==='2d'&&task.timeOfDay&&task.timeOfDay2&&task.timeOfDay!==task.timeOfDay2){
      // 2/D with two different slots
      const completionsToday=todayCompletions[task.id]||0;
      // First slot — show as done if at least 1 completion today
      slotEntries.push({task,slotId:task.timeOfDay,slotIndex:0,slotDone:completionsToday>=1});
      // Second slot — show as done if 2 completions today
      // Only show second slot if first slot is done (or both if first is done)
      slotEntries.push({task,slotId:task.timeOfDay2,slotIndex:1,slotDone:completionsToday>=2});
    }else{
      slotEntries.push({task,slotId:task.timeOfDay||'',slotIndex:0,slotDone:isDoneToday(task)});
    }
  });

  // Group by time of day → area
  TIME_OF_DAY.forEach(tod=>{
    const todEntries=slotEntries.filter(e=>e.slotId===tod.id);
    if(!todEntries.length)return;

    const todHead=el('div');
    todHead.style.cssText='display:flex;align-items:center;gap:8px;margin:20px 0 10px;';
    const todLabel=el('span');
    todLabel.style.cssText=`font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:${tod.color};padding:4px 12px;border-radius:12px;white-space:nowrap;`;
    todLabel.textContent=tod.label;
    const todLine=el('div');todLine.style.cssText='flex:1;height:1px;background:var(--section-line);';
    todHead.append(todLabel,todLine);body.appendChild(todHead);

    const areas=[...new Set(todEntries.map(e=>e.task.area||'General'))].sort();
    areas.forEach(area=>{
      const areaEntries=todEntries.filter(e=>(e.task.area||'General')===area);
      if(!areaEntries.length)return;
      const aHead=el('div','area-heading');aHead.textContent=area;body.appendChild(aHead);
      areaEntries.forEach(entry=>{
        const{task,slotIndex,slotDone}=entry;
        const completionsToday=todayCompletions[task.id]||0;
        // For 2/D dual slot: pass slot context so card shows correct done state
        const card=renderCard(task,false,{
          showCarryOver:!slotDone,
          slotDone,
          slotIndex,
          on2dMark:task.freq==='2d'&&task.timeOfDay2?()=>{
            // Mark one completion for this slot
            const t=S.tasks.find(t=>t.id===task.id);if(!t)return;
            const ts=todayStr()+'T12:00:00.000Z';
            t.completions=[...(t.completions||[]),ts];
            t.carryOvers=(t.carryOvers||[]).filter(d=>d!==todayStr());
            // Only roll nextDueDate after second completion
            if((t.completions||[]).filter(c=>c.startsWith(todayStr())).length>=2){
              t.nextDueDate=calcNextDueDate(t,todayStr());
            }
            save();render();
          }:null,
        });
        body.appendChild(card);
      });
    });
  });
}

function renderSchedule(body){
  backupWarningBanner(body);
  // View selector
  const stabs=el('div','schedule-tabs');
  ['day','week','month','year'].forEach(v=>{
    const b=el('button','schedule-tab'+(S.scheduleView===v?' active':''));
    b.textContent=v.charAt(0).toUpperCase()+v.slice(1);
    b.onclick=()=>{S.scheduleView=v;render();};
    stabs.appendChild(b);
  });
  body.appendChild(stabs);

  const d=S.scheduleDate instanceof Date?S.scheduleDate:new Date();

  if(S.scheduleView==='day') renderDayView(body,d);
  else if(S.scheduleView==='week') renderWeekView(body,d);
  else if(S.scheduleView==='month') renderMonthView(body,d);
  else renderYearView(body,d);
}

function navBar(label){
  const nav=el('div','schedule-nav');
  nav.style.padding='6px 10px';
  const prev=el('button','nav-arrow');prev.textContent='‹';
  const floral=scheduleNavFlowers(label);
  floral.style.flex='1';
  const next=el('button','nav-arrow');next.textContent='›';
  nav.append(prev,floral,next);
  return{nav,prev,next};
}

function renderDayView(body,d){
  const ds=dateStr(d);
  const isToday=ds===todayStr();
  const isPast=ds<todayStr();
  const label=isToday?'Today — '+d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}):d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const{nav,prev,next}=navBar(label);
  prev.onclick=()=>{S.scheduleDate=addDays(d,-1);render();};
  next.onclick=()=>{S.scheduleDate=addDays(d,1);render();};
  body.appendChild(nav);

  const tasks=tasksDueOn(ds);
  if(!tasks.length){
    const emp=el('div','empty');const tx=el('div','empty-text');
    tx.textContent=isPast?'No tasks were scheduled for this day.':'No tasks scheduled for this day.';
    emp.appendChild(tx);body.appendChild(emp);return;
  }

  // Past day label
  if(isPast){
    const pastNote=el('div');
    pastNote.style.cssText='font-size:11px;color:var(--brown-light);font-style:italic;margin-bottom:10px;text-align:center;';
    pastNote.textContent='Showing tasks that were scheduled for this day';
    body.appendChild(pastNote);
  }

  // Group by time of day → area
  TIME_OF_DAY.forEach(tod=>{
    const todTasks=tasks.filter(t=>(t.timeOfDay||'')===(tod.id));
    if(!todTasks.length)return;
    const todHead=el('div');
    todHead.style.cssText='display:flex;align-items:center;gap:8px;margin:20px 0 10px;';
    const todLabel=el('span');
    todLabel.style.cssText=`font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:${tod.color};padding:4px 12px;border-radius:12px;white-space:nowrap;`;
    todLabel.textContent=tod.label;
    const todLine=el('div');todLine.style.cssText='flex:1;height:1px;background:var(--section-line);';
    todHead.append(todLabel,todLine);body.appendChild(todHead);

    const areas=[...new Set(todTasks.map(t=>t.area||'General'))].sort();
    areas.forEach(area=>{
      const areaTasks=todTasks.filter(t=>(t.area||'General')===area);
      if(!areaTasks.length)return;
      const aHead=el('div','area-heading');aHead.textContent=area;body.appendChild(aHead);
      areaTasks.forEach(task=>{
        body.appendChild(renderCard(task,false,{showCarryOver:isToday,dateContext:ds}));
      });
    });
  });
}

function renderWeekView(body,d){
  const dow=d.getDay();
  const sunday=addDays(d,-dow);
  const days=Array.from({length:7},(_,i)=>addDays(sunday,i));
  const label=days[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+days[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const{nav,prev,next}=navBar(label);
  prev.onclick=()=>{S.scheduleDate=addDays(sunday,-7);render();};
  next.onclick=()=>{S.scheduleDate=addDays(sunday,7);render();};
  body.appendChild(nav);

  // Single unified grid — headers on row 1, tasks below
  const grid=el('div');
  grid.style.cssText='display:grid;grid-template-columns:repeat(7,1fr);gap:4px;width:100%;';

  // Row 1: day headers
  days.forEach((day,i)=>{
    const ds=dateStr(day);
    const isToday=ds===todayStr();
    const hdr=el('div','week-col-header'+(isToday?' today':''));
    hdr.style.cssText+='min-width:0;';
    hdr.innerHTML=`<div style="font-size:9px;">${DAY_NAMES[i]}</div><div style="font-size:11px;font-weight:700;">${day.getDate()}</div>`;
    grid.appendChild(hdr);
  });

  // Row 2+: task columns — one cell per day
  days.forEach(day=>{
    const ds=dateStr(day);
    const col=el('div','week-col');
    col.style.cssText='min-width:0;display:flex;flex-direction:column;gap:3px;';

    // Sort tasks by timeOfDay order
    const todOrder=['dawn','morning','afternoon','evening',''];
    const tasks=tasksDueOn(ds).sort((a,b)=>{
      return todOrder.indexOf(a.timeOfDay||'')- todOrder.indexOf(b.timeOfDay||'');
    });

    tasks.forEach(task=>{
      const bg=cardBg(task);
      const mc=el('div','week-mini-card');
      mc.style.cssText=`background:${bg};border-radius:3px;padding:4px 5px;font-size:9px;font-weight:700;line-height:1.3;cursor:pointer;min-width:0;overflow:hidden;`;

      // Dark text check — same luminosity logic as full cards
      const hexC=cardColor(task);
      const rr=parseInt(hexC.slice(1,3),16),gg=parseInt(hexC.slice(3,5),16),bb=parseInt(hexC.slice(5,7),16);
      const lum=(rr*0.299+gg*0.587+bb*0.114)/255;
      // Daily yellow always needs dark text
      const needsDark=lum>0.62||task.freq==='d';
      mc.style.color=needsDark?'rgba(0,0,0,0.78)':'rgba(255,255,255,0.92)';
      if(S.darkMode&&!needsDark) mc.style.color='rgba(255,240,220,0.88)';

      // Show time of day emoji if set
      const tod=TIME_OF_DAY.find(t=>t.id===(task.timeOfDay||''));
      const todEmoji=tod&&tod.id?tod.label.split(' ')[0]:'';
      mc.textContent=(todEmoji?todEmoji+' ':'')+task.name;
      mc.title=task.name+' ('+fById(task.freq).label+(task.timeOfDay?' · '+tod?.label:'')+')';
      mc.onclick=()=>{S.scheduleDate=day;S.scheduleView='day';render();};
      col.appendChild(mc);
    });

    if(!tasks.length){
      const empty=el('div');
      empty.style.cssText='font-size:10px;color:var(--border);text-align:center;padding:6px 0;';
      empty.textContent='·';
      col.appendChild(empty);
    }
    grid.appendChild(col);
  });

  body.appendChild(grid);
}

function renderMonthView(body,d){
  const year=d.getFullYear(),month=d.getMonth();
  const label=MONTH_NAMES[month]+' '+year;
  const{nav,prev,next}=navBar(label);
  prev.onclick=()=>{S.scheduleDate=new Date(year,month-1,1);render();};
  next.onclick=()=>{S.scheduleDate=new Date(year,month+1,1);render();};
  body.appendChild(nav);

  const grid=el('div','month-grid');
  DAY_NAMES.forEach(n=>{const h=el('div','month-day-header');h.textContent=n[0];grid.appendChild(h);});

  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const daysInPrev=new Date(year,month,0).getDate();

  // Prev month padding
  for(let i=firstDay-1;i>=0;i--){
    const cell=el('div','month-cell other-month');
    const dn=el('div','month-cell-date');dn.textContent=daysInPrev-i;
    cell.appendChild(dn);grid.appendChild(cell);
  }

  for(let day=1;day<=daysInMonth;day++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday=ds===todayStr();
    const cell=el('div','month-cell'+(isToday?' today':''));
    const dn=el('div','month-cell-date');dn.textContent=day;cell.appendChild(dn);
    const todOrder=['dawn','morning','afternoon','evening',''];
    const tasks=tasksDueOn(ds).sort((a,b)=>todOrder.indexOf(a.timeOfDay||'')-todOrder.indexOf(b.timeOfDay||''));
    if(tasks.length){
      const dotRow=el('div');
      tasks.slice(0,5).forEach(t=>{
        const dot=el('span','month-dot');dot.style.background=cardColor(t);dotRow.appendChild(dot);
      });
      if(tasks.length>5){const more=el('span','month-count');more.textContent=`+${tasks.length-5}`;dotRow.appendChild(more);}
      cell.appendChild(dotRow);
    }
    cell.onclick=()=>{S.scheduleDate=parseDate(ds);S.scheduleView='day';render();};
    grid.appendChild(cell);
  }

  // Next month padding
  const totalCells=firstDay+daysInMonth;
  const remainder=totalCells%7===0?0:7-(totalCells%7);
  for(let i=1;i<=remainder;i++){
    const cell=el('div','month-cell other-month');
    const dn=el('div','month-cell-date');dn.textContent=i;cell.appendChild(dn);grid.appendChild(cell);
  }
  body.appendChild(grid);
}

function renderYearView(body,d){
  const year=d.getFullYear();
  const{nav,prev,next}=navBar(String(year));
  prev.onclick=()=>{S.scheduleDate=new Date(year-1,0,1);render();};
  next.onclick=()=>{S.scheduleDate=new Date(year+1,0,1);render();};
  body.appendChild(nav);

  const grid=el('div','year-grid');
  for(let m=0;m<12;m++){
    const mCard=el('div','year-month');
    const mt=el('div','year-month-title');mt.textContent=MONTH_NAMES[m].slice(0,3);mCard.appendChild(mt);
    const daysInMonth=new Date(year,m+1,0).getDate();
    const firstDow=new Date(year,m,1).getDay();
    const miniGrid=el('div','year-mini-grid');
    // Padding
    for(let p=0;p<firstDow;p++){const c=el('div');c.style.height='10px';miniGrid.appendChild(c);}
    for(let day=1;day<=daysInMonth;day++){
      const ds=`${year}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const tasks=tasksDueOn(ds);
      const isToday=ds===todayStr();
      const cell=el('div','year-cell'+(isToday?' is-today':''));
      cell.style.cssText=`height:auto;min-height:10px;border-radius:2px;background:var(--parchment-dark);cursor:pointer;padding:1px;display:flex;flex-wrap:wrap;gap:1px;align-items:flex-start;`;
      if(tasks.length){
        tasks.slice(0,4).forEach(t=>{
          const dot=el('div');
          dot.style.cssText=`width:4px;height:4px;border-radius:50%;background:${cardColor(t)};flex-shrink:0;`;
          cell.appendChild(dot);
        });
        if(tasks.length>4){
          // fill rest with a small + indicator
          const more=el('div');
          more.style.cssText='width:4px;height:4px;border-radius:50%;background:var(--brown-light);flex-shrink:0;';
          cell.appendChild(more);
        }
      }
      if(isToday){cell.style.outline='1.5px solid var(--gold)';}
      cell.title=`${MONTH_NAMES[m]} ${day}: ${tasks.length} task${tasks.length!==1?'s':''}`;
      cell.onclick=()=>{S.scheduleDate=parseDate(ds);S.scheduleView='day';render();};
      miniGrid.appendChild(cell);
    }
    mCard.appendChild(miniGrid);
    grid.appendChild(mCard);
  }
  body.appendChild(grid);
}

function renderBrowse(body){
  backupWarningBanner(body);
  const toggle=el('div','browse-toggle');
  ['area','freq'].forEach(mode=>{
    const b=el('button','browse-btn'+(S.browseMode===mode?' active':''));
    b.textContent=mode==='area'?'By Area':'By Frequency/Type';
    b.onclick=()=>{S.browseMode=mode;render();};
    toggle.appendChild(b);
  });
  body.appendChild(toggle);

  const activeTasks=S.tasks.filter(t=>isActiveTask(t)||isFutureTask(t));

  if(S.browseMode==='freq'){
    const strip=el('div','filter-strip');
    const allBtn=el('button','filter-btn'+(S.freqFilter==='all'?' active':''));
    allBtn.textContent='All';
    if(S.freqFilter==='all'){allBtn.style.background='var(--brown)';allBtn.style.color='var(--bg)';allBtn.style.borderColor='var(--brown)';}
    allBtn.onclick=()=>{S.freqFilter='all';render();};strip.appendChild(allBtn);
    FREQS.forEach(f=>{
      const b=el('button','filter-btn'+(S.freqFilter===f.id?' active':''));
      b.textContent=f.label;
      if(S.freqFilter===f.id){b.style.background=S.freqColors[f.id];b.style.color=S.darkMode?'#2a1f18':'#fff';b.style.borderColor=S.freqColors[f.id];}
      b.onclick=()=>{S.freqFilter=f.id;render();setTimeout(()=>b.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}),50);};
      strip.appendChild(b);
    });
    S.specialTypes.forEach(sp=>{
      const b=el('button','filter-btn'+(S.freqFilter===sp.id?' active':''));
      b.textContent=sp.label;
      if(S.freqFilter===sp.id){b.style.background=sp.color;b.style.color='#fff';b.style.borderColor=sp.color;}
      b.onclick=()=>{S.freqFilter=sp.id;render();setTimeout(()=>b.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}),50);};
      strip.appendChild(b);
    });
    // Mini filter
    const miniFilterBtn=el('button','filter-btn'+(S.freqFilter==='__mini__'?' active':''));
    miniFilterBtn.textContent='✦ Mini';
    if(S.freqFilter==='__mini__'){miniFilterBtn.style.background='#e8d800';miniFilterBtn.style.color='#3a3128';miniFilterBtn.style.borderColor='#e8d800';}
    miniFilterBtn.onclick=()=>{S.freqFilter='__mini__';render();setTimeout(()=>miniFilterBtn.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}),50);};
    strip.appendChild(miniFilterBtn);
    body.appendChild(strip);
    let filtered=S.freqFilter==='all'?activeTasks:
      S.freqFilter==='__mini__'?activeTasks.filter(t=>t.mini):
      S.specialTypes.find(s=>s.id===S.freqFilter)?activeTasks.filter(t=>t.special===S.freqFilter):
      activeTasks.filter(t=>t.freq===S.freqFilter);
    if(!filtered.length){const emp=el('div','empty');const tx=el('div','empty-text');tx.textContent='No cards here yet.';emp.appendChild(tx);body.appendChild(emp);return;}
    filtered.forEach(task=>body.appendChild(renderCard(task,true)));
  }else{
    const strip=el('div','filter-strip');
    const allBtn=el('button','filter-btn'+(S.areaFilter==='all'?' active':''));
    allBtn.textContent='All';
    if(S.areaFilter==='all'){allBtn.style.background='var(--brown)';allBtn.style.color='var(--bg)';allBtn.style.borderColor='var(--brown)';}
    allBtn.onclick=()=>{S.areaFilter='all';render();};strip.appendChild(allBtn);
    const usedAreas=[...new Set(activeTasks.map(t=>t.area))].sort();
    usedAreas.forEach(a=>{
      const b=el('button','filter-btn'+(S.areaFilter===a?' active':''));
      b.textContent=a;
      if(S.areaFilter===a){b.style.background='var(--brown)';b.style.color='var(--bg)';b.style.borderColor='var(--brown)';}
      b.onclick=()=>{S.areaFilter=a;render();};strip.appendChild(b);
    });
    body.appendChild(strip);
    const areas=S.areaFilter==='all'?usedAreas:[S.areaFilter];
    areas.forEach(area=>{
      const tasks=activeTasks.filter(t=>t.area===area);if(!tasks.length)return;
      const ah=el('div','area-heading');ah.textContent=area;body.appendChild(ah);
      tasks.forEach(task=>body.appendChild(renderCard(task,false)));
    });
  }
}

// ══════════════════════════════════════════
// TAB: PENDING
// ══════════════════════════════════════════
function renderPending(body){
  backupWarningBanner(body);
  const pending=S.tasks.filter(t=>isPendingTask(t));
  const future=S.tasks.filter(t=>isFutureTask(t));

  if(!pending.length&&!future.length){
    const emp=el('div','empty');
    const ic=el('div','empty-icon');ic.textContent='📋';
    const tx=el('div','empty-text');tx.textContent='No pending cards. All tasks are scheduled!';
    emp.append(ic,tx);body.appendChild(emp);return;
  }

  if(pending.length){
    body.appendChild(sectionHead('Unscheduled','#9a8870',pending.length));
    const note=el('div');note.style.cssText='font-size:12px;color:var(--brown-light);margin-bottom:10px;font-style:italic;';
    note.textContent='These cards have no start date. Edit them to schedule.';
    body.appendChild(note);
    pending.forEach(task=>body.appendChild(renderCard(task,true)));
  }

  if(future.length){
    body.appendChild(sectionHead('Scheduled — Not Yet Active','#6a9fd4',future.length));
    const note=el('div');note.style.cssText='font-size:12px;color:var(--brown-light);margin-bottom:10px;font-style:italic;';
    note.textContent='These cards will become active on their start date.';
    body.appendChild(note);
    future.sort((a,b)=>a.startDate.localeCompare(b.startDate));
    future.forEach(task=>{
      const card=renderCard(task,true);
      // Add start date label
      const sd=el('div');sd.style.cssText='font-size:10px;color:rgba(0,0,0,0.55);padding:4px 20px 6px;font-family:"Lato",sans-serif;font-style:italic;';
      sd.textContent='Starts: '+parseDate(task.startDate).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
      card.appendChild(sd);
      body.appendChild(card);
    });
  }
}

// Color picker modal
function showColorPicker(type,id,currentColor){
  const bd=el('div','backdrop');
  bd.onclick=e=>{if(e.target===bd)bd.remove();};
  const modal=el('div','modal');
  const title=el('div','modal-title');title.textContent='Choose Color';
  const sub=el('div','modal-sub');
  if(type==='freq'){const f=FREQS.find(f=>f.id===id);sub.textContent=f?`${f.label} — ${f.name}`:'Frequency';}
  else{const sp=S.specialTypes.find(s=>s.id===id);sub.textContent=sp?sp.label+' cards':'Special';}
  const grid=el('div','color-grid');
  COLOR_PALETTE.forEach(c=>{
    const sw=el('div','color-swatch'+(c===currentColor?' selected':''));
    sw.style.background=c;
    sw.onclick=()=>{
      if(type==='freq'){S.freqColors[id]=c;}
      else{const sp=S.specialTypes.find(s=>s.id===id);if(sp)sp.color=c;}
      save();bd.remove();render();
    };
    grid.appendChild(sw);
  });
  modal.append(title,sub,grid);bd.appendChild(modal);document.body.appendChild(bd);
}

// ══════════════════════════════════════════
// FLORAL PAGE TITLE
// ══════════════════════════════════════════
function floralPageTitle(body,titleText){
  const wrap=el('div');
  wrap.style.cssText='text-align:center;margin-bottom:20px;';
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 320 80');
  svg.setAttribute('width','100%');
  svg.style.cssText='max-width:320px;display:block;margin:0 auto;overflow:visible;';
  const W=320,H=80;
  const isLight=!S.darkMode;
  const acc=S.darkAccent||'#c06878';
  const ra=parseInt(acc.slice(1,3),16),ga=parseInt(acc.slice(3,5),16),ba=parseInt(acc.slice(5,7),16);
  const lighter=`rgb(${Math.min(255,ra+50)},${Math.min(255,ga+50)},${Math.min(255,ba+50)})`;
  const rc=isLight?'#f0b0c0':lighter;
  const rd=isLight?'#d4788a':acc;
  const dp=isLight?'#b8a0d4':lighter;
  const lc=isLight?'#7a9a6a':'#a07880';
  const vine=isLight?'#5a7a4a':'#987080';
  function rb(x,y,r=6){return `<circle cx="${x}" cy="${y}" r="${r}" fill="${rc}" opacity=".85"/><circle cx="${x}" cy="${y}" r="${r*.55}" fill="${rd}" opacity=".9"/>`;}
  function daisy(x,y,r=9){return Array.from({length:10},(_,i)=>{const a=i*36*Math.PI/180;return `<ellipse cx="${x+Math.cos(a)*r}" cy="${y+Math.sin(a)*r}" rx="4" ry="2" fill="${dp}" opacity=".85" transform="rotate(${i*36} ${x+Math.cos(a)*r} ${y+Math.sin(a)*r})"/>`;}).join('')+`<circle cx="${x}" cy="${y}" r="4" fill="${isLight?'#e8d840':lighter}"/>`;}
  function sf(x,y,r=9){return Array.from({length:12},(_,i)=>{const a=i*30*Math.PI/180;return `<ellipse cx="${x+Math.cos(a)*r}" cy="${y+Math.sin(a)*r}" rx="4" ry="2" fill="${isLight?'#f5c842':lighter}" opacity=".9" transform="rotate(${i*30} ${x+Math.cos(a)*r} ${y+Math.sin(a)*r})"/>`;}).join('')+`<circle cx="${x}" cy="${y}" r="5" fill="${isLight?'#8B6914':acc}"/>`;}
  function pansy(x,y,s=.75){return `<ellipse cx="${x-7*s}" cy="${y-4*s}" rx="${8*s}" ry="${5*s}" fill="${isLight?'#7060c0':acc}" opacity=".8"/><ellipse cx="${x+7*s}" cy="${y-4*s}" rx="${8*s}" ry="${5*s}" fill="${isLight?'#7060c0':acc}" opacity=".8"/><ellipse cx="${x}" cy="${y+5*s}" rx="${8*s}" ry="${5*s}" fill="${isLight?'#5048a8':rd}" opacity=".85"/><ellipse cx="${x-6*s}" cy="${y+2*s}" rx="${6*s}" ry="${4*s}" fill="${isLight?'#8878d0':lighter}" opacity=".7"/><ellipse cx="${x+6*s}" cy="${y+2*s}" rx="${6*s}" ry="${4*s}" fill="${isLight?'#8878d0':lighter}" opacity=".7"/><circle cx="${x}" cy="${y+1*s}" r="${2.5*s}" fill="${isLight?'#f5e87a':lighter}"/>`;}
  function leaf(x,y,rx,ry,rot){return `<ellipse cx="${x}" cy="${y}" rx="${rx}" ry="${ry}" fill="${lc}" opacity=".72" transform="rotate(${rot} ${x} ${y})"/>`;}

  svg.innerHTML=`
    <path d="M20 ${H/2} Q${W*.12} 20 ${W*.28} ${H/2} Q${W*.15} ${H*.8} 20 ${H/2}" stroke="${vine}" stroke-width="1.2" fill="none" opacity=".4"/>
    <path d="M${W-20} ${H/2} Q${W*.88} 20 ${W*.72} ${H/2} Q${W*.85} ${H*.8} ${W-20} ${H/2}" stroke="${vine}" stroke-width="1.2" fill="none" opacity=".4"/>
    ${leaf(18,H/2-8,13,6,-30)}${leaf(30,H/2-18,11,5,10)}${leaf(22,H/2+10,12,5,40)}
    ${leaf(W-18,H/2-8,13,6,30)}${leaf(W-30,H/2-18,11,5,-10)}${leaf(W-22,H/2+10,12,5,-40)}
    ${rb(42,H/2-14,5)}${rb(28,H/2+8,4)}
    ${rb(W-42,H/2-14,5)}${rb(W-28,H/2+8,4)}
    ${daisy(62,H/2-8,8)}${daisy(W-62,H/2-8,8)}
    ${sf(W/2-60,H/2+2,7)}${sf(W/2+60,H/2+2,7)}
    ${pansy(W/2-80,H/2-5,.65)}${pansy(W/2+80,H/2-5,.65)}
    ${leaf(W/2-40,14,10,5,-15)}${leaf(W/2+40,14,10,5,15)}
    ${rb(W/2-20,10,4)}${rb(W/2+20,10,4)}
  `;

  const fo=document.createElementNS('http://www.w3.org/2000/svg','foreignObject');
  fo.setAttribute('x','60');fo.setAttribute('y','18');
  fo.setAttribute('width','200');fo.setAttribute('height','44');
  fo.innerHTML=`<div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--text);text-align:center;line-height:1.3;">${titleText}</div>`;
  svg.appendChild(fo);
  wrap.appendChild(svg);
  body.appendChild(wrap);
}
