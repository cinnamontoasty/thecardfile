  floral.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;border-radius:12px;pointer-events:none;z-index:0;';

  function buildFloralSVG(W,H){
    function rosebud(x,y,r=8){return `<circle cx="${x}" cy="${y}" r="${r}" fill="#f0b0c0" opacity=".8"/><circle cx="${x}" cy="${y}" r="${r*.6}" fill="#d4788a" opacity=".9"/>`;}
    function daisy(x,y,r=11,color='#b8a0d4'){return Array.from({length:10},(_,i)=>{const a=i*36*Math.PI/180;return `<ellipse cx="${x+Math.cos(a)*r}" cy="${y+Math.sin(a)*r}" rx="5" ry="2.5" fill="${color}" opacity=".85" transform="rotate(${i*36} ${x+Math.cos(a)*r} ${y+Math.sin(a)*r})"/>`;}).join('')+`<circle cx="${x}" cy="${y}" r="5" fill="#e8d840"/>`;}
    function sunflower(x,y,r=12){return Array.from({length:12},(_,i)=>{const a=i*30*Math.PI/180;return `<ellipse cx="${x+Math.cos(a)*r}" cy="${y+Math.sin(a)*r}" rx="5" ry="2.5" fill="#f5c842" opacity=".9" transform="rotate(${i*30} ${x+Math.cos(a)*r} ${y+Math.sin(a)*r})"/>`;}).join('')+`<circle cx="${x}" cy="${y}" r="6" fill="#8B6914"/>`;}
    function pansy(x,y,s=1){return `<ellipse cx="${x-8*s}" cy="${y-5*s}" rx="${9*s}" ry="${6*s}" fill="#7060c0" opacity=".8"/><ellipse cx="${x+8*s}" cy="${y-5*s}" rx="${9*s}" ry="${6*s}" fill="#7060c0" opacity=".8"/><ellipse cx="${x}" cy="${y+6*s}" rx="${9*s}" ry="${6*s}" fill="#5048a8" opacity=".85"/><ellipse cx="${x-7*s}" cy="${y+3*s}" rx="${7*s}" ry="${5*s}" fill="#8878d0" opacity=".7"/><ellipse cx="${x+7*s}" cy="${y+3*s}" rx="${7*s}" ry="${5*s}" fill="#8878d0" opacity=".7"/><circle cx="${x}" cy="${y+2*s}" r="${3*s}" fill="#f5e87a"/>`;}
    function leaf(x,y,rx,ry,rot){return `<ellipse cx="${x}" cy="${y}" rx="${rx}" ry="${ry}" fill="#7a9a6a" opacity=".7" transform="rotate(${rot} ${x} ${y})"/>`;}
    const m=H/2;
    return `
      <path d="M30 0 Q0 ${H*.25} 20 ${m} Q0 ${H*.75} 30 ${H}" stroke="#5a7a4a" stroke-width="1.5" fill="none" opacity=".45"/>
      <path d="M${W-30} 0 Q${W} ${H*.25} ${W-20} ${m} Q${W} ${H*.75} ${W-30} ${H}" stroke="#5a7a4a" stroke-width="1.5" fill="none" opacity=".45"/>
      <path d="M0 30 Q${W*.25} 10 ${W/2} 25 Q${W*.75} 10 ${W} 30" stroke="#5a7a4a" stroke-width="1.2" fill="none" opacity=".4"/>
      <path d="M0 ${H-30} Q${W*.25} ${H-10} ${W/2} ${H-20} Q${W*.75} ${H-10} ${W} ${H-30}" stroke="#5a7a4a" stroke-width="1.2" fill="none" opacity=".4"/>
      ${leaf(25,20,16,8,-30)}${leaf(50,12,13,7,15)}${leaf(90,18,14,7,-10)}
      ${leaf(W-25,20,16,8,30)}${leaf(W-50,12,13,7,-15)}${leaf(W-90,18,14,7,10)}
      ${leaf(W/2-30,10,14,7,5)}${leaf(W/2+30,10,14,7,-5)}
      ${rosebud(38,42,7)}${rosebud(70,28,6)}${rosebud(W-38,42,7)}${rosebud(W-70,28,6)}
      ${daisy(W/2,22,10,'#b8a0d4')}${sunflower(130,25,10)}${sunflower(W-130,25,10)}
      ${pansy(200,30,0.8)}${pansy(W-200,30,0.8)}
      ${leaf(12,m*.4,15,8,40)}${leaf(22,m*.5,12,6,-20)}${leaf(10,m*.8,14,7,50)}${leaf(22,m*.9,11,6,-30)}
      ${leaf(12,m*1.2,15,8,35)}${leaf(22,m*1.3,12,6,-15)}${leaf(10,m*1.6,14,7,45)}${leaf(22,m*1.5,11,6,-25)}
      ${rosebud(28,m*.44,7)}${daisy(20,m*.76,9,'#c8b0e4')}${sunflower(25,m,9)}${pansy(22,m*1.44,.75)}${rosebud(28,m*1.76,6)}
      ${leaf(W-12,m*.4,15,8,-40)}${leaf(W-22,m*.5,12,6,20)}${leaf(W-10,m*.8,14,7,-50)}${leaf(W-22,m*.9,11,6,30)}
      ${leaf(W-12,m*1.2,15,8,-35)}${leaf(W-22,m*1.3,12,6,15)}${leaf(W-10,m*1.6,14,7,-45)}${leaf(W-22,m*1.5,11,6,25)}
      ${rosebud(W-28,m*.44,7)}${daisy(W-20,m*.76,9,'#c8b0e4')}${sunflower(W-25,m,9)}${pansy(W-22,m*1.44,.75)}${rosebud(W-28,m*1.76,6)}
      ${leaf(25,H-20,16,8,30)}${leaf(55,H-12,13,7,-15)}${leaf(90,H-18,14,7,10)}
      ${leaf(W-25,H-20,16,8,-30)}${leaf(W-55,H-12,13,7,15)}${leaf(W-90,H-18,14,7,-10)}
      ${leaf(W/2-30,H-10,14,7,-5)}${leaf(W/2+30,H-10,14,7,5)}
      ${rosebud(40,H-40,7)}${rosebud(72,H-26,6)}${rosebud(W-40,H-40,7)}${rosebud(W-72,H-26,6)}
      ${daisy(W/2,H-22,10,'#b8a0d4')}${sunflower(140,H-26,10)}${sunflower(W-140,H-26,10)}
      ${pansy(210,H-32,.8)}${pansy(W-210,H-32,.8)}`;

  content.appendChild(howToLink);

  // Gentle sponsors link
  const sponsorLink=el('div');
  sponsorLink.style.cssText='text-align:center;margin-top:16px;padding-top:14px;border-top:1px solid rgba(90,74,56,0.2);font-family:"Lato",sans-serif;font-size:11px;color:#9a8870;line-height:1.6;';
  sponsorLink.innerHTML='If you enjoy The Card File and would like to support its creator,<br>you can <a href="https://github.com/sponsors/cinnamontoasty" target="_blank" style="color:#5a4a38;font-weight:600;text-decoration:underline;">buy Beth a coffee ☕</a> — always optional, never expected. 🌸';
  content.appendChild(sponsorLink);

  // Close button (X) top right
  const closeBtn=el('button');
  closeBtn.style.cssText='position:absolute;top:14px;right:14px;background:rgba(58,49,40,0.15);border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;color:#3a3128;display:flex;align-items:center;justify-content:center;z-index:2;line-height:1;';
  closeBtn.textContent='×';closeBtn.title='Close';
  closeBtn.onclick=()=>{
    localStorage.setItem('cf4_welcomeSeen','1');
    S.showWelcome=false;
    if(S.firstTime){S.tab='walkthrough';}
    render();
  };
  modal.appendChild(closeBtn);

  modal.appendChild(content);bd.appendChild(modal);

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const h=modal.offsetHeight||700,w=modal.offsetWidth||480;
    floral.setAttribute('viewBox',`0 0 ${w} ${h}`);
    floral.innerHTML=buildFloralSVG(w,h);
    if(window.ResizeObserver){
      const ro=new ResizeObserver(()=>{
        const nh=modal.offsetHeight,nw=modal.offsetWidth;
        floral.setAttribute('viewBox',`0 0 ${nw} ${nh}`);
        floral.innerHTML=buildFloralSVG(nw,nh);
      });ro.observe(modal);
    }
  }));
  return bd;
}

// ══════════════════════════════════════════
// TASK MODAL (ADD / EDIT)
// ══════════════════════════════════════════
function buildModal(data,isEdit){
  const bd=el('div','backdrop');
  bd.onclick=e=>{if(e.target===bd){isEdit?S.editTask=null:S.showAdd=false;render();}};
  const modal=el('div','modal');
  const title=el('div','modal-title');title.textContent=isEdit?'Edit Card':'New Card';
  const sub=el('div','modal-sub');sub.textContent=isEdit?'Modify this task':'Add a task to your card file';
  modal.append(title,sub);

  // Name
  const f1=el('div','field');const l1=el('label');l1.textContent='Task Name';
  const i1=el('input');i1.type='text';i1.value=data.name||'';i1.placeholder='e.g., Wipe stovetop';
  i1.oninput=e=>data.name=e.target.value;f1.append(l1,i1);modal.appendChild(f1);

  // Area
  const f2=el('div','field');const l2=el('label');l2.textContent='Area / Room';
  const sel2=el('select');
  const allAreas=[...new Set([...S.areas,...(data.area?[data.area]:[])])].sort();
  allAreas.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;if(a===data.area)o.selected=true;sel2.appendChild(o);});
  // Custom area option
  const customOpt=document.createElement('option');customOpt.value='__custom__';customOpt.textContent='+ Add new area...';sel2.appendChild(customOpt);
  sel2.onchange=e=>{
    if(e.target.value==='__custom__'){
      const val=prompt('Enter new room/area name:');
      if(val&&val.trim()){
        const v=val.trim();
        if(!S.areas.includes(v)){S.areas.push(v);save();}
        data.area=v;
        const o=document.createElement('option');o.value=v;o.textContent=v;o.selected=true;
        sel2.insertBefore(o,customOpt);sel2.value=v;
      }else{sel2.value=data.area||allAreas[0];}
    }else{data.area=e.target.value;}
  };
  f2.append(l2,sel2);modal.appendChild(f2);

  // Frequency
  const f3=el('div','field');const l3=el('label');l3.textContent='Frequency';
  const sel3=el('select');
  FREQS.forEach(f=>{const o=document.createElement('option');o.value=f.id;o.textContent=`${f.label} — ${f.name}`;if(f.id===data.freq)o.selected=true;sel3.appendChild(o);});
  sel3.onchange=e=>data.freq=e.target.value;f3.append(l3,sel3);modal.appendChild(f3);

  // Time
  const f4=el('div','field');const l4=el('label');l4.textContent="Time (e.g., 5', 30', 1hr)";
  const i4=el('input');i4.type='text';i4.value=data.time||'';i4.placeholder="10'";
  i4.oninput=e=>data.time=e.target.value;f4.append(l4,i4);modal.appendChild(f4);

  // Supplies
  const f5=el('div','field');const l5=el('label');l5.textContent='Equipment / Supplies';
  const ta=el('textarea');ta.value=data.supplies||'';ta.placeholder='e.g., Broom, dustpan, cleaner';
  ta.oninput=e=>data.supplies=e.target.value;f5.append(l5,ta);modal.appendChild(f5);

  // Card type
  const f6=el('div','field');const l6=el('label');l6.textContent='Card Type';
  const sel6=el('select');
  [['','Standard (frequency color)'],...S.specialTypes.map(s=>[s.id,s.label])].forEach(([val,txt2])=>{
    const o=document.createElement('option');o.value=val;o.textContent=txt2;if(val===data.special)o.selected=true;sel6.appendChild(o);
  });
  sel6.onchange=e=>data.special=e.target.value;f6.append(l6,sel6);modal.appendChild(f6);

  // Start date
  const f7=el('div','field');const l7=el('label');l7.textContent='Start Date (leave blank to save as Pending)';
  const i7=el('input');i7.type='date';i7.value=data.startDate||'';
  i7.oninput=e=>data.startDate=e.target.value;f7.append(l7,i7);modal.appendChild(f7);

  // Time of day
  const f8=el('div','field');const l8=el('label');l8.textContent='Time of Day';
  const sel8=el('select');
  [['','No preference (Anytime)'],['dawn','🌅 Dawn'],['morning','🌞 Morning'],['afternoon','☀️ Afternoon'],['evening','🌙 Evening']].forEach(([val,txt2])=>{
    const o=document.createElement('option');o.value=val;o.textContent=txt2;
    if((data.timeOfDay||'')=== val)o.selected=true;sel8.appendChild(o);
  });
  sel8.onchange=e=>{data.timeOfDay=e.target.value;updateTod2Visibility();};
  f8.append(l8,sel8);modal.appendChild(f8);

  // Second time of day (only for 2/D)
  const f8b=el('div','field');
  const l8b=el('label');l8b.textContent='Second Time of Day (2/D only)';
  const sel8b=el('select');
  [['','None'],['dawn','🌅 Dawn'],['morning','🌞 Morning'],['afternoon','☀️ Afternoon'],['evening','🌙 Evening']].forEach(([val,txt2])=>{
    const o=document.createElement('option');o.value=val;o.textContent=txt2;
    if((data.timeOfDay2||'')=== val)o.selected=true;sel8b.appendChild(o);
  });
  sel8b.onchange=e=>data.timeOfDay2=e.target.value;
  f8b.append(l8b,sel8b);modal.appendChild(f8b);

  function updateTod2Visibility(){
    const is2d=(data.freq||sel3.value)==='2d';
    f8b.style.display=is2d?'block':'none';
    if(!is2d) data.timeOfDay2='';
  }
  // Also update when freq changes
  sel3.addEventListener('change',updateTod2Visibility);
  updateTod2Visibility();

  // Mini — fixed for mobile: use a proper toggle button instead of checkbox
  const miniWrap=el('div');miniWrap.style.cssText='margin-bottom:14px;';
  const miniBtn=el('button');
  miniBtn.type='button';
  const updateMiniBtn=()=>{
    miniBtn.style.cssText=`width:100%;font-family:'Lato',sans-serif;font-size:13px;font-weight:${data.mini?'700':'400'};padding:12px 14px;border-radius:8px;border:${data.mini?'2px solid var(--gold)':'1.5px solid var(--border)'};background:${data.mini?'rgba(200,169,110,0.15)':'var(--bg)'};color:var(--text);cursor:pointer;text-align:left;-webkit-appearance:none;transition:all .2s;`;
    miniBtn.textContent=(data.mini?'✦ ':'○ ')+'Mini task (5–10 min, pick up anytime)';
  };
  updateMiniBtn();
  miniBtn.onclick=e=>{e.preventDefault();data.mini=!data.mini;updateMiniBtn();};
  miniWrap.appendChild(miniBtn);modal.appendChild(miniWrap);

  // Completion history editor (edit mode only)
  if(isEdit&&data.completions&&data.completions.length){
    const histSection=el('div');
    histSection.style.cssText='margin-bottom:14px;border-top:1px solid var(--border);padding-top:14px;';
    const histTitle=el('div');
    histTitle.style.cssText='font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--brown-light);margin-bottom:8px;';
    histTitle.textContent='Completion History — tap a date to correct it';
    histSection.appendChild(histTitle);
    const recent=[...data.completions].reverse().slice(0,8);
    recent.forEach((comp,revIdx)=>{
      const origIdx=data.completions.length-1-revIdx;
      const dateStr2=comp.slice(0,10);
      const dispDate=parseDate(dateStr2).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
      const row=el('div');
      row.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--border);';
      const dl=el('div');dl.style.cssText='font-size:13px;color:var(--text);';dl.textContent='✓ '+dispDate;
      const editDateBtn=el('button');
      editDateBtn.style.cssText='font-family:"Lato",sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card-bg);color:var(--brown-light);cursor:pointer;-webkit-appearance:none;';
      editDateBtn.textContent='Change date';
      editDateBtn.onclick=e=>{
        e.preventDefault();
        // Show date input inline
        const inp=document.createElement('input');inp.type='date';inp.value=dateStr2;
        inp.style.cssText='font-family:"Lato",sans-serif;font-size:13px;border:1px solid var(--gold);border-radius:6px;padding:6px 10px;background:var(--bg);color:var(--text);outline:none;';
        const confirmBtn=el('button');
        confirmBtn.style.cssText='font-family:"Lato",sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 12px;border-radius:6px;border:none;background:var(--gold);color:var(--brown);cursor:pointer;margin-left:6px;-webkit-appearance:none;';
        confirmBtn.textContent='Save';
        confirmBtn.onclick=ev=>{
          ev.preventDefault();
          if(inp.value&&inp.value!==dateStr2){
            data.completions[origIdx]=inp.value+'T12:00:00.000Z';
          }
          row.innerHTML='';row.append(dl);dl.textContent='✓ '+parseDate(inp.value||dateStr2).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
          const eb2=editDateBtn.cloneNode(true);eb2.onclick=editDateBtn.onclick;row.append(eb2);
        };
        row.innerHTML='';row.append(inp,confirmBtn);
      };
      const delBtn2=el('button');
      delBtn2.style.cssText='font-family:"Lato",sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;padding:5px 10px;border-radius:6px;border:1px solid rgba(180,60,60,0.3);background:none;color:#c0392b;cursor:pointer;margin-left:6px;-webkit-appearance:none;';
      delBtn2.textContent='Remove';
      delBtn2.onclick=e=>{
        e.preventDefault();
        data.completions.splice(origIdx,1);
        row.remove();
      };
      const btnWrap=el('div');btnWrap.style.cssText='display:flex;gap:4px;';
      btnWrap.append(editDateBtn,delBtn2);
      row.append(dl,btnWrap);histSection.appendChild(row);
    });
    if(data.completions.length>8){
      const more=el('div');more.style.cssText='font-size:11px;color:var(--brown-light);padding-top:6px;font-style:italic;';
      more.textContent=`...and ${data.completions.length-8} older completions`;
      histSection.appendChild(more);
    }
    modal.appendChild(histSection);
  }

  // Buttons
  const btns=el('div','modal-btns');
  const cancel=el('button','btn btn-ghost');cancel.textContent='Cancel';cancel.onclick=()=>{isEdit?S.editTask=null:S.showAdd=false;render();};
  const save=el('button','btn btn-primary');save.textContent=isEdit?'Save Changes':'Add Card';save.onclick=()=>isEdit?saveEdit():addTask();
  if(isEdit){
    const del=el('button','btn btn-danger');del.textContent='Delete';del.onclick=()=>deleteTask(data.id);btns.append(cancel,del,save);
  }else{btns.append(cancel,save);}
  modal.appendChild(btns);bd.appendChild(modal);setTimeout(()=>i1.focus(),60);return bd;
}

// ══════════════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════════════
function render(){
  const app=document.getElementById('app');app.innerHTML='';
  // Remove old side flowers
  document.querySelectorAll('.side-flowers').forEach(e=>e.remove());

  // Install hint
  if(S.showInstall){
    const bar=el('div','install-hint');
    const txt2=el('div','install-hint-text');
    txt2.innerHTML='📌 <strong>Save to Home Screen:</strong> Open in Safari → tap Share → <em>Add to Home Screen</em>';
    const x=el('button','install-hint-close');x.textContent='×';
    x.onclick=()=>{S.showInstall=false;localStorage.setItem('cf4_installOk','1');render();};
    bar.append(txt2,x);app.appendChild(bar);
  }

  // Daily notification — rebuild from due tasks if needed
  const dueTodayForNotif=S.tasks.filter(t=>isDueToday(t));
  if(dueTodayForNotif.length&&!S._notification){
    S._notification=dueTodayForNotif;
  }

  // Header
  const header=el('div','header');
  const htop=el('div','header-top');
  const hleft=el('div');
  const ey=el('div','eyebrow');ey.textContent='Household Management';
  const ht=el('div','htitle');ht.textContent='The Card File';
  hleft.append(ey,ht);
  const hr=el('div','hright');
  const hd=el('div','hdate');hd.textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const dueCount=S.tasks.filter(t=>isDueToday(t)).length;
  const hdu=el('div','hdue');
  hdu.textContent=`${dueCount} task${dueCount!==1?'s':''} due`;
  hdu.title='Click to show/hide today\'s task list';
  hdu.onclick=()=>{
    const due=S.tasks.filter(t=>isDueToday(t));
    if(due.length){
      if(!S._notification) S._notification=due;
      S.notificationDismissed=!S.notificationDismissed;
      render();
    }
  };
  hr.append(hd,hdu);htop.append(hleft,hr);

  const tabs=el('div','tabs');
  const mainTabs=[['today','Today'],['schedule','Schedule'],['browse','Browse'],['pending','Pending']];
  mainTabs.forEach(([id,label])=>{
    const tab=el('div','tab'+(S.tab===id?' active':''));
    tab.textContent=label;tab.onclick=()=>{S.tab=id;render();};tabs.appendChild(tab);
  });
  const settingsTab=el('div','tab settings-tab'+(S.tab==='settings'||S.tab==='howto'||S.tab==='walkthrough'?' active':''));
  settingsTab.textContent='⚙ Settings';
  settingsTab.onclick=()=>{S.tab='settings';render();};tabs.appendChild(settingsTab);
  header.append(htop,tabs);app.appendChild(header);

  // Daily notification — appears AFTER header, only if not dismissed
  if(S._notification&&!S.notificationDismissed){
    const nb=el('div','notif');
    const bd2=el('div','notif-body');
    const t=el('div','notif-title');t.textContent='Tasks due today — '+new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

    // Build accent-aware flower garland SVG
    function makeGarland(){
      const isLight=!S.darkMode;
      const acc=S.darkAccent||'#c06878';
      const ra=parseInt(acc.slice(1,3),16),ga=parseInt(acc.slice(3,5),16),ba=parseInt(acc.slice(5,7),16);
      const lighter=`rgb(${Math.min(255,ra+55)},${Math.min(255,ga+55)},${Math.min(255,ba+55)})`;
      const rc=isLight?'#f0b0c0':lighter;
      const rd=isLight?'#d4788a':acc;
      const dp=isLight?'#b8a0d4':lighter;
      const dc=isLight?'#e8d840':lighter;
      const sf=isLight?'#f5c842':lighter;
      const lc=isLight?'#7a9a6a':'#907878';
      const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('viewBox','0 0 400 16');
      svg.setAttribute('preserveAspectRatio','xMidYMid meet');
      svg.style.cssText='width:100%;height:16px;display:block;';
      svg.innerHTML=`
        <path d="M0 8 Q200 2 400 8" stroke="${lc}" stroke-width="1" fill="none" opacity=".5"/>
        ${[20,60,100,140,180,220,260,300,340,380].map((x,i)=>{
          if(i%3===0) return `<circle cx="${x}" cy="8" r="4" fill="${rc}" opacity=".85"/><circle cx="${x}" cy="8" r="2.2" fill="${rd}" opacity=".9"/>`;
          if(i%3===1) return Array.from({length:8},(_,j)=>{const a=j*45*Math.PI/180;return `<ellipse cx="${x+Math.cos(a)*5}" cy="${8+Math.sin(a)*5}" rx="2.5" ry="1.2" fill="${dp}" opacity=".8" transform="rotate(${j*45} ${x+Math.cos(a)*5} ${8+Math.sin(a)*5})"/>`;}).join('')+`<circle cx="${x}" cy="8" r="2.5" fill="${dc}"/>`;
          return Array.from({length:8},(_,j)=>{const a=j*45*Math.PI/180;return `<ellipse cx="${x+Math.cos(a)*4}" cy="${8+Math.sin(a)*4}" rx="2" ry="1" fill="${sf}" opacity=".85" transform="rotate(${j*45} ${x+Math.cos(a)*4} ${8+Math.sin(a)*4})"/>`;}).join('')+`<circle cx="${x}" cy="8" r="2" fill="#8B6914"/>`;
        }).join('')}
        ${[40,80,120,160,200,240,280,320,360].map(x=>`<ellipse cx="${x}" cy="8" rx="8" ry="3.5" fill="${lc}" opacity=".55" transform="rotate(${Math.random()>0.5?15:-15} ${x} 8)"/>`).join('')}
      `;
      return svg;
    }

    // Top garland
    const topGarland=makeGarland();bd2.appendChild(topGarland);
    bd2.appendChild(t);

    // Tasks in columns
    const tasks=S._notification;
    const cols=Math.min(3,Math.ceil(tasks.length/3));
    const list=el('div');
    list.style.cssText=`display:grid;grid-template-columns:repeat(${cols},1fr);gap:2px 12px;margin:6px 0;`;
    tasks.forEach(task=>{
      const d=el('div');
      d.style.cssText='font-size:12px;line-height:1.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
      const color=cardColor(task);
      d.innerHTML=`<span style="color:${color};font-weight:700;">${fById(task.freq).label}</span> ${task.name}`;
      list.appendChild(d);
    });
    bd2.appendChild(list);

    // Bottom garland
    const bottomGarland=makeGarland();bd2.appendChild(bottomGarland);

    nb.style.cssText='position:relative;';
    const x=el('button','notif-close');x.textContent='×';
    x.onclick=()=>{S.notificationDismissed=true;render();};
    nb.append(bd2,x);app.appendChild(nb);
  }

  // Body
  const body=el('div','body');
  if(S.tab==='today') renderToday(body);
  else if(S.tab==='schedule') renderSchedule(body);
  else if(S.tab==='browse') renderBrowse(body);
  else if(S.tab==='pending') renderPending(body);
  else if(S.tab==='settings') renderSettings(body);
  else if(S.tab==='howto') renderHowTo(body);
  else if(S.tab==='walkthrough') renderWalkthrough(body);
  app.appendChild(body);

  // FAB — Today, Browse, Pending, and Schedule tabs
  if(S.tab==='today'||S.tab==='browse'||S.tab==='pending'||S.tab==='schedule'){
    const fab=el('button','fab');fab.textContent='+';fab.title='Add card';
    fab.onclick=()=>{S.showAdd=true;render();};app.appendChild(fab);
  }

  // Modals
  if(S.showAdd) app.appendChild(buildModal(S.newTask,false));
  if(S.editTask) app.appendChild(buildModal(S.editTask,true));
  if(S.showWelcome) app.appendChild(buildWelcomeScreen());

  // Side flowers (wide screens only — CSS handles hiding on mobile)
  buildSideFlowers();
}

// ══════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════
load();render();
</script>
